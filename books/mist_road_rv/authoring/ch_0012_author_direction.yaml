chapter: 12
author_intent:
- Preserve chapter 12 as the first active Qinghe exterior triage scene, not another distant verification scene.
- Make Lin Zhixia's professional value the chapter's central payoff: she sorts observable child, exterior short-aid man, and rejected grey-eyed patient under pressure.
- Make Lu Chenzhou's strength visible through the safety frame he builds for her judgment: no names, no door opening, lamp line, reduced speaker exposure, rod delivery, and reverse movement.
- Keep the chapter emotionally pressurized without turning rescue into sentimental override; the RV helps, but help does not become boarding.
- Escalate voice mimicry from environmental lure into patient-site / body behavior, but do not explain the full monster ecology.
- End on a concrete chapter 13 threat: grey-white vine activity from the grey-eyed patient.
must_change:
- Do not enter Qinghe main building or reveal a full Qinghe survivor organization.
- Do not acquire Simple Medical Bay materials or activate the module.
- Do not let the abdominal bleeding man, child, grey-eyed patient, or any unknown survivor enter the RV.
- Do not promote Zhou Xiaohe to formal crew or living-space access.
- Do not use the system to decide who should be saved.
- Do not turn the grey-white vine into a full taxonomy or complete explanation yet.
