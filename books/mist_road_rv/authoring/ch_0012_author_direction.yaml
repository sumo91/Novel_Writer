rejected_patterns:
- Avoid generic inner monologue explanations.
- Avoid interchangeable dialogue.
- Avoid vague cliffhangers without a concrete next pressure.
- Avoid safe-zone exploration exposition.
- Avoid sentimental rescue override.
- Avoid medical textbook explanation detached from visible symptoms.
- Avoid module reward without material acquisition and contamination cost.
- Avoid making Lu Chenzhou a passive driver while Lin Zhixia carries the whole scene alone.
