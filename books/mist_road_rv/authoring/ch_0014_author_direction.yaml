rejected_patterns:
- Avoid turning material retrieval into an equipment manual.
- Avoid free upgrade payoff without contamination, tool, filter, or seal cost.
- Avoid sentimental rescue override during material pressure.
- Avoid overexplaining the vine ecology or Qinghe social structure.
- Avoid system prompts that make the decision for the characters.
- Avoid repeating retrieval beats without a new risk, choice, or cost.
