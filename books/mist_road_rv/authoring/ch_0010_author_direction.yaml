chapter: 10
author_intent:
- Preserve chapter 10 as the first-station closure and Qinghe transition chapter. The point is not a new battle win, but proving that the RV can continue under rules, low filter stability, damaged sealing, and medical pressure.
- Keep the opening pressure immediate: broadcast, rear-seal damage, fog-wall countdown, low-efficiency filter, and Zhou Xiaohe's condition before any Qinghe explanation.
- Make Lu Chenzhou's payoff a boundary procedure: he does not blindly rescue or coldly abandon; he verifies the call, keeps the vehicle pointed toward retreat, refuses door-opening pressure, and chooses a controlled route to the medical-point exterior.
- Make Lin Zhixia's stay feel functional rather than sentimental. She becomes responsible for medical observation, pollution triage, and the isolation zone because she already acts like a crew member.
- Keep Zhou Xiaohe as a temporary observation patient whose injury justifies the medical-line pressure, not as a formal teammate or a tool for emotional blackmail.
- Let the ending open Qinghe with concrete threats: medical-point material signal, abnormal door access, rising pollution, and possible voice mimicry.
must_change:
- Do not unlock the Simple Medical Bay in chapter 10.
- Do not fully repair the clean filter or rear seal.
- Do not enter the Qinghe main building or reveal the full Qinghe survivor order.
- Do not open the RV door to unverified outsiders.
- Do not let the system make moral choices for Lu Chenzhou; it can only report route, risk, status, and module clues.
- Do not promote Zhou Xiaohe to formal crew or living-space access.
- Remove any meta-fictional wording; all dialogue must stay inside character and world.
approved_lines:
- "规则不因为你问一句就变。"
- "她需要医疗条件，但医疗条件不能替代污染边界。"
- "它只会把不确定写成不确定。"
- "乘客只问能不能活。车组成员要负责一块区域，负责一个后果。"
- "观察区归我。污染分诊归我。医疗建议我给，车门决定按规则走。"
- "麻烦不等于没救，失控才等于没救。"
- "路能走，就还有选择。"
- "门不开。"
- "观察区我守。"
rejected_patterns:
- Avoid generic inner monologue explanations.
- Avoid interchangeable dialogue.
- Avoid vague cliffhangers without a concrete next pressure.
- Avoid making Qinghe a safe-zone exposition dump.
- Avoid sentimental onboarding speeches.
- Avoid system rewards without cost, uncertainty, or route risk.
ai_assistance:
  expected: true
  human_role: direction, taste, key edits, final approval
approved_for_final_candidate: true
