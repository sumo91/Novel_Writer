rejected_patterns:
- Avoid monster encyclopedia explanation detached from scene pressure.
- Avoid sentimental rescue override that opens the RV boundary.
- Avoid free upgrade payoff from contaminated residue.
- Avoid external characters naming or understanding the golden finger.
- Avoid making Lin Zhixia lecture; her observations should change immediate actions.
- Avoid making Lu Chenzhou passive while the vine pressure escalates.
- Avoid vague ending dread without a concrete chapter 14 material-contest obligation.
