chapter: 13
author_intent:
- Preserve chapter 13 as the first physical vine-mutated patient counter, not a lore explanation or main-building exploration.
- Make the chapter's main爽点 a non-contact win: Lu Chenzhou keeps the RV door shut while using light, reverse movement, vehicle angle, exterior speaker, rope, rod, and abandoned tools to break the vine's leverage.
- Let Lin Zhixia's value upgrade from exterior triage to pollution-mechanism observation: she names provisional reactions to blood, medical supplies, sound response, contact stimulus, and door direction without turning them into final rules.
- Keep the child and abdominal bleeding man alive only through obedience to instructions, reinforcing that controllable survivors can receive a window of help without gaining boarding status.
- Treat contaminated residue as a tempting but dangerous candidate clue for the Simple Medical Bay, not a free module reward.
- End with a specific next pressure: residue blocks or complicates access to the real medical materials while the filter window shrinks.
must_change:
- Do not let any unknown survivor, grey-eyed patient, child, or abdominal bleeding man enter the RV.
- Do not open the RV door or recover contaminated tools / medical bag into the living area.
- Do not allow any outside voice or survivor to know the RV "system" by name.
- Do not acquire complete Simple Medical Bay materials or activate the module.
- Do not enter Qinghe main building or explain Qinghe's survivor organization.
- Do not define the complete vine ecology, mother-hive road, fog-heart figure, or father line.
