rejected_patterns:
- Avoid safe-zone exploration exposition.
- Avoid monster taxonomy or full voice-mimicry explanation.
- Avoid sentimental rescue override.
- Avoid module reward without cost or material acquisition.
- Avoid making Lu Chenzhou passive while voices perform the scene.
