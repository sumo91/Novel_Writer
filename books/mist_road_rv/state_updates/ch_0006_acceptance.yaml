chapter: 6
title: 污染分诊
source_draft: drafts/ch_0006_final_candidate.md
accepted_chapter_path: chapters/ch_0006.md
summary: 房车抵达青河服务区外仓接近口前，周小禾出现发冷、渗血和瞳孔灰边等疑似污染体征。林知夏建立外伤、雾吸入、疑似异变三档临时污染分诊，陆沉舟将其转成车内规则：临时观察区不等于生活区，上车名额与观察窗口分开。两人用旧帘布、急救箱、塑封袋和绳索搭出临时观察区。周小禾提供青河后仓线索：净化耗材、医疗材料和修车胶在后仓，但钥匙或门禁卡由仓库控制者老郑掌握。房车停在外仓口，看见锁链、拖痕和写着拿物资可以、上车不行的木牌，下一章进入物资与上车资格切割。
current_state:
  current_chapter: 6
  current_arc: arc_001
  latest_location: 青河服务区外仓接近口，房车停在外仓路口外侧未熄火
  active_characters:
  - lu_chenzhou
  - lin_zhixia
  active_conflicts:
  - 房车停在青河服务区外仓接近口外侧，后保险杠断裂，车体密封完整度仍为 72%，车尾仍有淡雾味渗入。
  - 净雾滤芯仍为临时加压固定，滤芯效率仍为 23%，需要密封胶、备用卡箍和隔离帘材料。
  - 周小禾处于临时观察区，出现发冷、渗血、瞳孔灰边等疑似污染体征，但尚未确认异变。
  - 外仓有锁链、拖痕和“拿物资可以 / 上车不行”的木牌，物资与上车资格即将发生规则冲突；青河内部情况仍未揭开。
  pending_approvals:
  - 'Approve the provisional onboard contamination triage rule: external injury, mist
    inhalation observation, and suspected mutation are handled separately.'
  - Approve that temporary observation / isolation does not equal formal boarding
    qualification.
  - Approve Qinghe rear warehouse supplies and Old Zheng's key/access control as the
    chapter 7 material-control hook without treating it as a full Qinghe interior
    reveal.
state_changes:
- The RV reaches the Qinghe Service Area outer warehouse approach with rear sealing
  still damaged at 72% and clean-mist filter efficiency still at 23%.
- The injured girl is identified as Zhou Xiaohe and remains a temporary observation
  passenger, not a formal onboard member or core teammate.
- Zhou Xiaohe shows coldness, rapid breathing, continued bleeding, and a faint gray
  edge around the pupil, creating an early contamination suspicion without confirming
  irreversible mutation.
- 'Lin Zhixia establishes a provisional three-tier onboard triage rule: external injury,
  mist inhalation observation, and suspected mutation.'
- 'Lu Chenzhou converts the triage rule into vehicle rules: observation zone is not
  living space, temporary observation is not boarding qualification, and noncompliance
  or aggression ends the observation window.'
- A makeshift rear observation / isolation area is built from an old curtain, first-aid
  box, plastic wrap, tape, and rope, but it is explicitly not a proper medical isolation
  setup.
- The RV still needs sealant, spare clamps, isolation-curtain material, and basic
  medical supplies; none are gained for free in this chapter.
- 'Zhou Xiaohe provides a limited Qinghe outer-warehouse clue: rear warehouse supplies
  exist, but the key or access card is controlled by a warehouse keeper called Old
  Zheng.'
- The chapter ends at the Qinghe outer warehouse approach, where a chained roll-up
  door and sign reading '拿物资可以 / 上车不行' point chapter 7 toward material control and
  boarding-rule conflict.
- Qinghe Service Area interior order, full factions, and complete medical station
  layout remain unrevealed.
