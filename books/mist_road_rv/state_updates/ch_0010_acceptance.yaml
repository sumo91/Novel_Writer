state_changes:
- After the car-seizing night, the RV leaves the first unnamed service-area outer
  edge and receives the Qinghe broadcast about medical power, survivors, and a warning
  not to open the outer warehouse door.
- Lu Chenzhou tests the broadcast by checking repetition, signal behavior, route reaction,
  and specific information rather than treating the rescue call as an order to open
  doors.
- The RV's rear seal remains temporary and under pressure; the clean filter remains
  in low-efficiency short-range stability rather than full repair.
- Lin Zhixia identifies Zhou Xiaohe's need for better treatment and power support,
  but explicitly accepts that medical need cannot override pollution boundaries.
- 'Lu Chenzhou establishes first external-rescue contact rules: verify first, keep
  a retreat line, do not enter the main building, do not approach the outer warehouse
  door, and do not open doors to unverified callers.'
- Lin Zhixia chooses to stay as the RV's medical observation / pollution triage /
  isolation-zone role, not merely as a protected passenger.
- The RV crosses a first low-concentration fog segment and reaches the Qinghe service-area
  medical-point exterior with the vehicle nose kept toward retreat.
- The broadcast implies a living person may be interrupting the loop and warns that
  something can imitate voices, opening a mist-monster sound-mimicry thread without
  fully explaining it.
- The system detects the Simple Medical Bay as a possible unlockable module and indicates
  materials may be at the Qinghe medical point, while pollution level rises and outer-warehouse
  access is abnormal.
