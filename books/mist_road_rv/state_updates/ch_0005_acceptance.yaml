chapter: 5
title: 雾犬追车
source_draft: drafts/ch_0005_final_candidate.md
accepted_chapter_path: chapters/ch_0005.md
summary: 雾犬咬住房车后保险杠并被血味与滤芯排气吸引，陆沉舟利用急刹、转向和废弃货车底盘撕脱雾犬，代价是后保险杠断裂、车体后部密封下降至72%、滤芯效率降至23%。林知夏确认血味和车尾排气是早期诱因，伤员仍需尽快处理，路线被迫转向青河服务区外仓接近口寻找密封胶、卡箍和隔离帘材料。
current_state:
  current_chapter: 5
  current_arc: arc_001
  latest_location: 高速迷雾路段，房车驶向青河服务区外仓接近口，距青河服务区约 15 公里
  active_characters:
  - lu_chenzhou
  - lin_zhixia
  active_conflicts:
  - 房车甩脱第一只雾犬，但后保险杠断裂，车体密封完整度降至 72%，车尾有淡雾味渗入。
  - 净雾滤芯仍为临时加压固定，滤芯效率降至 23%，再次遭遇追咬会继续压低安全余量。
  - 临时观察位的受伤女孩仍在渗血，需要缝合和更稳定处理，但她不是核心队友或正式上车名额。
  - 青河服务区外仓接近口成为下一步路线目标，寻找密封胶、备用卡箍和隔离帘材料；青河内部情况仍未揭开。
  pending_approvals: []
state_changes:
- The RV begins chapter 5 with a fog dog biting and dragging the rear bumper while
  vehicle integrity is at 74%.
- The fog dog continues to bite and drag the RV, causing the rear bumper / rear seal
  to worsen and vehicle integrity to drop to 72%.
- The clean-mist filter remains active but its efficiency drops from 26% to 23% under
  drag, vibration, and external pollution disturbance near the temporary exhaust /
  venting point.
- Lin Zhixia observes that the fog dog responds to both the injured girl's blood smell
  and the RV's clean-filter exhaust / rear venting flow.
- Lu Chenzhou uses road conditions, warning cones, a sharp brake, steering, and a
  disabled truck's raised rear chassis to tear the fog dog loose from the RV.
- The RV escapes the first fog dog but loses or damages part of the rear bumper.
- The injured girl remains only a temporary observation passenger; her wound still
  needs better treatment and does not make her a core teammate.
- The next route pressure shifts toward Qinghe Service Area outer warehouse / repair-material
  entrance, with possible sealant, spare clamps, and isolation-curtain material.
- Qinghe Service Area interior conditions remain unrevealed.
