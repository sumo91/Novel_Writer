chapter: 4
title: 被拒绝的人
source_draft: drafts/ch_0004_final_candidate.md
accepted_chapter_path: chapters/ch_0004.md
summary: 房车离开第一服务区后，被拒幸存者开着冒烟面包车追上来，用孩子、输液袋和伤员逼陆沉舟停车。陆沉舟识破对方借救援抢车的意图，只接收一名服从指令且通过林知夏初筛的受伤女孩进入临时观察，拒绝整车风险转嫁；面包车撞上护栏后，第一只雾犬咬住房车后保险杠。
current_state:
  current_chapter: 4
  current_arc: arc_001
  latest_location: 高速迷雾路段，距青河服务区约 15 公里，雾犬咬住房车后保险杠
  active_characters:
  - lu_chenzhou
  - lin_zhixia
  active_conflicts:
  - 雾犬已经咬住房车后保险杠，车体密封完整度降至 74%，持续拖拽会影响临时滤芯固定。
  - 房车净雾滤芯仍为临时加压固定，滤芯效率和车体密封都在追车与颠簸中承压。
  - 一名受伤女孩进入临时观察位，需要止血和后续处理，但她不是核心队友或正式上车名额。
  - 青河服务区仍有简易医疗位模块钩子和真实广播线索，但内部情况尚未揭开。
  pending_approvals:
  - Approve chapter 4 limited rescue case - one compliant injured girl is accepted
    into temporary observation while the rest of the minivan group is refused RV entry.
  - Approve chapter 4 light trigger for Lu Chenzhou's old mall-fire rescue accident
    without treating it as a full reveal.
  - Approve the rescued girl's short Qinghe witness line as a hook, not a full Qinghe
    reveal.
state_changes:
- Lu Chenzhou and Lin Zhixia continue toward Qinghe Service Area after leaving the
  first service area.
- A smoking minivan of rejected survivors pursues the RV and uses a child, an IV bag,
  and injured people to force a stop.
- Lu Chenzhou identifies the minivan's posture as a forced-stop / vehicle-seizure
  attempt rather than compliant rescue.
- Lin Zhixia performs roadside medical and pollution triage, identifying a gray-faced
  adult as unsafe for RV entry and a wounded teenage girl as controllable for temporary
  observation.
- Lu Chenzhou separates rescue from boarding: the child receives limited exterior
    aid, the unsafe gray-faced adult is refused entry, and one compliant injured girl
    is accepted into temporary observation.
- The rescued girl says Qinghe has power and that the broadcast is real, but the warning
  is interrupted before revealing Qinghe's interior situation.
- Lu Chenzhou's old rescue accident is lightly triggered by the image of weak people
  being pushed forward to force a rescuer's decision; no full truth is revealed.
- The rejected survivors attempt to seize or stop the RV with a rope, forced door
  pressure, and minivan impact; Lu Chenzhou uses a narrow roadside obstruction and
  vehicle positioning to escape.
- The minivan crashes into the guardrail, and a fast gray-white fog dog emerges as
  the first visible road-speed monster escalation.
- A fog dog bites the RV rear bumper, dropping vehicle integrity to 74% and threatening
  the temporary clean-mist filter fixing.
