summary: 青河医疗点外出现低烧孩子、腹部出血男人和被绑灰眼伤员等多重求救对象。陆沉舟不开门、不叫名，用灯线、外放、投送包和倒车保持撤离边界；林知夏完成第一次青河车外分诊，救治可控外伤者、拒绝疑似异变接触，并确认声音拟态已经进入人体
  / 伤员现场。章末灰眼伤员借孩子声音求救，手腕冒出灰白雾藤，推动第13章进入藤化伤员升级。
