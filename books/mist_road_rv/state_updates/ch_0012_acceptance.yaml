  - 陆沉舟将外部求救接触规则升级为现场分诊流程：不叫名字、不开车门、灯线边界、外放控制、投送包短救和倒车撤离。
  - 林知夏完成第一次青河车外分诊：低烧孩子可观察，腹部出血男人可车外短救，灰眼绑手伤员为高风险疑似异变并拒绝接触。
  - 医疗救助与上车资格再次切开；腹部出血男人得到最低限度车外止血指导，但没有进入房车或获得上车资格。
  - 声音拟态从外部诱饵推进到人体 / 伤员现场：灰眼伤员被拒后借用孩子声音求救。
  - 灰白雾藤从灰眼伤员手腕伤口钻出，提示污染伤员即将异变，下一章必须处理藤化伤员。
  - 简易医疗位材料仍只是线索，未取得、未消毒、未安装，模块未启动；青河主楼和幸存者组织仍未揭开。
