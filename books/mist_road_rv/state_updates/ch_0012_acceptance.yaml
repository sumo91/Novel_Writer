state_changes:
- The RV remains outside Qinghe medical point with engine running, doors closed, retreat
  angle preserved, and exterior contact controlled through lights, external speaker,
  distance, and reverse movement.
- Lu Chenzhou establishes a lamp-line boundary and no-name exterior protocol, using
  a rod-delivered aid bag instead of opening the RV.
- Three exterior triage subjects appear: a low-fever child with footprints and command
    response, an abdominal bleeding man who can self-pressure, and a bound grey-eyed
    patient with repeated request behavior.
- Lin Zhixia performs the first Qinghe exterior triage: observable child, exterior
    short-aid man, and rejected high-risk suspected mutation.
- The abdominal bleeding man receives stopgap exterior pressure-dressing guidance;
  this is limited aid, not boarding qualification, formal treatment completion, or
  team membership.
- Zhou Xiaohe remains in temporary observation behind the isolation curtain and provides
  only a limited cue that the repeated child voice matches the earlier false lure.
- Voice mimicry advances into patient-site behavior when the grey-eyed patient uses
  the child's voice after being refused.
- Grey-white vine activity emerges from the grey-eyed patient's wrist wound and taps
  like the earlier wall knock, opening the chapter 13藤化伤员 threat.
- No Simple Medical Bay material is acquired, no module is activated, and Qinghe main-building
  survivor order remains unrevealed.
