chapter: 9
title: 抢车夜
source_draft: drafts/ch_0009_final_candidate.md
accepted_chapter_path: chapters/ch_0009.md
summary: 房车在青河外仓口外侧主路遭遇旧面包车路障和抢车小团体夜袭。陆沉舟拒绝开门，用车灯、喇叭、破拆钩、倒车角和车身重量守住驾驶位与车门规则；林知夏守住周小禾临时观察区、隔离帘和污染材料。抢车者制造的噪音与强光引来雾犬，阵形被反噬，房车冲出第一轮围堵。系统判定车内协同规则初步成立，净雾滤芯进入短时稳定校准，但雾墙回压仍在扩大，青河广播传来医疗电源与幸存者求救。
current_state:
  current_chapter: 9
  current_arc: arc_001
  latest_location: 青河服务区外缘主路，房车已冲出旧面包车路障，正在青河指示牌前接收求救广播
  active_characters:
  - lu_chenzhou
  - lin_zhixia
  - temporary_injured_girl
  - old_zheng
  active_conflicts: &id001
  - 抢车小团体第一轮夜袭已被打退，旧面包车路障和抢车者阵形被雾犬与自身路障反噬冲散，但青河外部人类压力未完全消失。
  - 车尾临时封堵在挤压突围中继续受损，只能维持短时窗口，仍需正式密封件与修复机会。
  - 净雾滤芯进入短时稳定校准 / 低效稳定状态，但这不是完整恢复，长时间停留仍会导致污染风险回升。
  - 周小禾在临时观察区内听指令、未越过隔离帘，但伤口疼痛明显，仍需要后续医疗处理。
  - 林知夏与陆沉舟形成第一次实战协同：外部路线与车门规则由陆沉舟控制，车内观察区、隔离箱和伤员稳定由林知夏控制。
  - 青河旧广播传来医疗电源、幸存者和不要开外仓门的断续求救信息，第10章必须处理是否回应广播和第一站收束。
  - 雾墙回压区仍在扩大，系统要求天亮前驶离青河服务区外缘。
  - 青河主楼、完整内部秩序、服务区终端源头和简易医疗位仍未揭开。
  pending_approvals: &id002
  - Approve chapter 9 as the first successful combat test of the RV door rules and internal collaboration rules.
  - Approve short-term filter stabilization as a limited system payoff, not a full filter repair.
  - Approve that fog dogs are attracted by human noise, lights, and metal strikes as an early visible ecology rule.
  - Approve the 青河 medical-power broadcast only as the chapter 10 hook, not as an acquired medical module or completed rescue.
  - Approve that Zhou Xiaohe remains a temporary observation patient, not a formal onboard member or core teammate.
state_changes:
- 'The RV faces a direct roadblock at Qinghe outer-warehouse road: an old van, fire-extinguisher pressure, crowbar strikes, strong light, and side-door prying.'
- Lu Chenzhou refuses to open the door, keeps driver control, and uses headlights, horn timing, the demolition hook, vehicle angle, wet shoulder space, and the attackers' own roadblock to create an exit path.
- Lin Zhixia holds the temporary observation zone, side-door lock boundary, isolation curtain, contaminated packaging box, and Zhou Xiaohe's wound stabilization during the assault.
- Zhou Xiaohe remains a temporary observation patient, follows instructions, does not cross the curtain, and does not enter the RV living space as a formal member.
- Human noise, lights, metal strikes, and panic draw fog dogs toward the loudest / brightest attackers, confirming an early mist-monster ecology rule without fully explaining it.
- The RV escapes the first wave of the car-seizing night; the attackers are scattered by fog dogs and their own roadblock, but the RV's rear sealing remains temporary and damaged.
- The system recognizes that the RV door rules, observation-zone boundary, contaminated-material isolation, and driver control remained intact under pressure.
- The clean filter reaches short-term stable calibration / low-efficiency stability, not full recovery.
- 'A Qinghe broadcast introduces the next hook: medical power, remaining survivors, and a warning not to open the outer-warehouse door.'
