chapter: 3
title: 房车第一次穿雾
source_draft: drafts/ch_0003_final_candidate.md
accepted_chapter_path: chapters/ch_0003.md
summary: 陆沉舟在第一服务区围堵中执行上车规则，林知夏以急诊分诊和污染观察能力签约上车；两人用临时加压固定启动净雾滤芯，房车第一次冲入迷雾，并锁定 17 公里外的青河服务区与可解锁模块简易医疗位。
current_state:
  current_chapter: 3
  current_arc: arc_001
  latest_location: 高速迷雾路段，正驶向青河服务区
  active_characters:
  - lu_chenzhou
  - lin_zhixia
  active_conflicts:
  - 房车净雾滤芯仅为临时加压固定，滤芯效率和车体密封仍在下降。
  - 青河服务区出现求救广播和简易医疗位模块钩子，但广播里混入疑似雾犬低吼。
  pending_approvals:
  - Approve the temporary pressure sealing workaround as a chapter 3 execution detail,
    not a permanent replacement for a standard sealing ring.
  - Whether the current functional-entry beat is enough to count as Lin Zhixia's first
    real onboard role, or whether revision should make it more explicit.
state_changes:
- Lu Chenzhou executes the first boarding rule under public pressure and refuses people
  who use children, hidden wounds, or chaos to force RV entry.
- Lin Zhixia boards under the contract rule and takes responsibility for medical triage
  and pollution observation inside the RV.
- The clean-mist filter core is temporarily pressure-fixed using sealant, clamps,
  a metal inspection plate, and RV spare hardware.
- The clean-mist filter starts in low-concentration short-crossing mode, giving the
  RV its first short-term safe-air capability.
- The RV breaks out of the first service area and enters the fog wall for the first
  time.
- The next route marker locks onto Qinghe Service Area, 17 km ahead, with the unlockable
  module 'simple medical berth'.
- The ending audio hints at a faster dog-like fog creature, foreshadowing the next
  monster escalation.
open_threads_touched:
- thread_rv_system_binding
- thread_mist_monster_ecology
- thread_vehicle_rules_contract
- thread_lin_pollution_observation
