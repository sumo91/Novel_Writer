summary: 陆沉舟在青河医疗点外用车灯、短喇叭、车身角度和闭门规则夺回现场命令权，挡住雾犬围站与幸存者风险转嫁；林知夏建立车外分诊线，拒绝污染疑似者和未知幸存者贴车。章末医疗点内亮起稳定手术灯，真人广播者提出救一个关键伤员换二号配电箱权限。
current_state:
  current_chapter: 15
