state_changes:
- 陆沉舟从短窗口取材者推进为现场命令权夺回者，建立“看车灯 / 车内通话，不听外部拟声”的临时规则。
- 林知夏从材料判断者推进为车外分诊线守门人，明确医疗救助不能被污染转嫁绑架。
- 周小禾仍临时观察，最多报告车尾声响、广播声像不像真陆、低热变化。
- 腹部出血男人和低烧孩子继续留在车外，不上车，但通过听灯光 / 不听声音保留下一轮处理机会。
