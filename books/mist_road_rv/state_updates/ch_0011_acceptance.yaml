chapter: 11
title: 青河服务区
source_draft: drafts/ch_0011_final_candidate.md
accepted_chapter_path: chapters/ch_0011.md
summary: 陆沉舟在青河医疗点外缘不开门、不进楼，用错误编号测试拆出假声与更可信的墙内回应，确认二号配电箱、折叠医疗架、隔离膜和电源接口等简易医疗位线索。林知夏在观察周小禾伤情的同时识别医疗材料价值，并拒绝被模仿声音和假孩子诱导开门；章节以假孩子无脚印、后墙仍有闷敲收束，推动第12章进入欺骗环境下的分诊选择。
current_state:
  current_chapter: 11
  current_arc: arc_001
  latest_location: 青河服务区医疗点外缘，房车斜停并保持车头朝撤离路线；后墙确认二号配电箱、折叠医疗架、隔离膜和电源接口线索，但车门未开、人员未下车、材料未取得。
  active_characters:
  - lu_chenzhou
  - lin_zhixia
  - temporary_injured_girl
  active_conflicts:
  - 房车抵达青河医疗点外缘后保持发动机运行和撤离角度，仍处于污染等级上升、低效滤芯窗口有限、车尾封堵微漏的压力中。
  - 陆沉舟执行外部求救接触规则：不开门、不进主楼、不贴外仓门、不回应未验证的开门请求，通过外放、灯光和错误编号测试验证信息。
  - 青河医疗点后墙确认二号配电箱、折叠医疗架、隔离膜和电源接口等简易医疗位线索，但只是可争取材料信号，尚未取得材料或解锁模块。
  - 声音拟态从警告变成可见威胁：外部声音会复读开门请求、使用名字、模仿林知夏，并用假孩子诱导靠近。
  - 墙内疑似仍有活人或医疗资源，但门口也有诱饵；第12章必须处理欺骗环境下的分诊、接触顺序和撤离线。
  - 林知夏继续负责医疗观察和污染分诊，周小禾仍是临时观察患者，低热和伤口疼痛未解决，不能转为正式成员或生活区人员。
  pending_approvals:
  - Approve chapter 11 as Qinghe medical-point exterior validation only, not main-building
    entry.
  - Approve No. 2 power box / folding medical frame / isolation film / power interface
    as verified Simple Medical Bay material leads, not acquired materials.
  - Approve voice mimicry as an observed Qinghe threat behavior without fully defining
    the ecology.
  - Approve the permission-error / welcome-back gate behavior as terminal abnormality
    and old-protocol unease, not a father-route hard clue.
  - Approve Zhou Xiaohe remaining a temporary observation patient after providing
    a useful sound-observation cue.
state_changes:
- The RV remains at Qinghe medical-point exterior with the engine running, doors closed,
  and nose toward the retreat route.
- Lu Chenzhou applies the external-rescue contact rule in practice: all contact stays
    outside the vehicle through controlled speaker, light, distance, and verification
    prompts.
- Lu Chenzhou uses an intentionally wrong No. 3 power-box prompt to separate repetition
  from credible response; the more credible trapped voice corrects it to No. 2.
- The rear-wall No. 2 power box, folding medical frame, isolation film, and power
  interface are visually verified as Simple Medical Bay leads, but no item is touched,
  acquired, or installed.
- The gate alternates between permission error and welcome back, advancing Qinghe
  terminal abnormality / old-protocol unease without revealing the source.
- Voice mimicry becomes observable through repeated rescue lines, Lu Chenzhou's name,
  an imitation of Lin Zhixia, and a false child lure.
- Lin Zhixia identifies material value while refusing to let usefulness override contamination
  boundaries; her key triage rule becomes that who to save first cannot be decided
  by who cries most convincingly.
- Zhou Xiaohe remains in the temporary observation area with low fever and wound pain;
  she provides a small sound-observation cue but does not become formal crew or enter
  the living area.
- The chapter ends with a child-like figure that has no footprints and only dragged
  marks, while real knocking may still be coming from inside the rear wall.
