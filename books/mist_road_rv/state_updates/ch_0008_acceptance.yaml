state_changes:
- Old Zheng's broadcast continues to expose the RV location and clean-filter value,
  drawing human vehicles, shouting, metal strikes, and fog-side pressure toward the
  outer warehouse.
- Qinghe outer-warehouse lights begin shutting down while fog backflows into the approach
  area; long停留 becomes dangerous under low filter efficiency and rear sealing damage.
- 'Lu Chenzhou establishes the practical repair rule: repair only to the point the
  RV can move, not to full restoration under exposure.'
- Lin Zhixia isolates contaminated outer packaging, performs minimum wound stabilization
  on Zhou Xiaohe, and keeps the temporary observation boundary intact.
- The RV uses the gained industrial sealant, clamps, curtain material, and filter-edge
  material for temporary rear sealing and short-term filter stabilization.
- The temporary repair lowers immediate leakage and stabilizes the filter briefly
  but does not fully repair vehicle integrity, restore clean-filter efficiency to
  a safe value, or unlock a medical module.
- Zhou Xiaohe remains a temporary observation patient, not a formal onboard member
  or core teammate; she remains able to follow instructions.
- External survivors begin active road-blocking and line-pulling behavior, but the
  full car-seizure assault remains the next chapter's conflict.
- Human noise, vehicle lights, and metal strikes attract fog dogs / fog-side fast
  targets toward the outer warehouse route.
- The chapter ends with the RV squeezing out of the outer warehouse approach toward
  a blocked route, entering the car-seizure night pressure.
