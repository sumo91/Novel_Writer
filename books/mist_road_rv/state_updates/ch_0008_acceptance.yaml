  - 车尾只完成临时封堵，效果不稳定；后部密封仍不能视为完整修复，剧烈冲撞可能破坏封堵。
  - 净雾滤芯仍处低效状态，滤芯边料只提供短时稳定，无法恢复完整效率；长时间停留仍会导致污染浓度回升。
  - 周小禾仍在临时观察区，伤口只做最低限度固定，突围颠簸会增加伤口撕裂和污染观察风险。
  - 外部抢车者已经开始堵路、喊话、照车窗和拉扯车尾线束，但还未完成第9章的正面夜袭。
  - 金属敲击、车灯、发动机声和人群喊叫已吸引雾犬或雾中高速目标逼近。
  - 青河主楼、完整内部秩序、服务区终端源头和简易医疗位仍未揭开。
