chapter: 14
title: 医疗位材料
source_draft: drafts/ch_0014_final_candidate.md
accepted_chapter_path: chapters/ch_0014.md
summary: 陆沉舟在青河医疗点外制定三分钟短窗口取材路线，林知夏判断隔离膜、折叠医疗架和无菌电源线束的污染状态；车组取得污染隔离膜外卷和折叠医疗架可用部件并外置隔离，但无菌电源接口
  / 线束被灰白残片接触后放弃，简易医疗位仍未安装未启动。章末外仓侧门远程开启，假陆沉舟声音广播“门开了，上车”。
current_state:
  current_chapter: 14
  current_arc: arc_001
  latest_location: 青河服务区医疗点外缘，房车仍发动、门关闭、车头朝撤离路线；污染隔离膜外卷和折叠医疗架可用部件挂在车外后挂架外置隔离，无菌电源线束被污染放弃；外仓侧门远程开启，假陆沉舟指令正在诱导幸存者上车。
  active_characters:
  - lu_chenzhou
  - lin_zhixia
  - temporary_injured_girl
  active_conflicts:
  - 房车仍在青河医疗点外缘，发动机运行，撤离角度保留，车门锁闭；净雾滤芯低效稳定窗口缩短到约6分钟。
  - 简易医疗位材料条件取得大半：污染隔离膜外卷和折叠医疗架可用部件已外置隔离，仍待清洁、安装和判定。
  - 无菌电源接口 / 线束被灰白残片接触后放弃，简易医疗位仍未安装、未启动，后续还需要电源 / 权限 / 安装条件。
  - 车尾临时封堵在取材中继续承压，外置隔离袋挂在车外，工具和钩头仍有污染风险。
  - 灰白藤体残片仍未采样、未判定，继续阻断医疗点路径并会对震动、血迹和声音有反应。
  - 腹部出血男人和低烧孩子仍在车外，只能按灯光 / 指令保留短暂生存窗口，未获得上车资格。
  - 外部幸存者已看见房车争取医疗材料，材料争夺和道德转嫁压力上升，但青河完整幸存者组织仍未揭开。
  - 声音拟态升级为假陆沉舟指令：“门开了，上车”；真实陆沉舟明确只有车内命令才算数。
  pending_approvals:
  - 批准第14章取得简易医疗位大半材料条件，但不安装、不启动、不解锁完整模块。
  - 批准污染隔离膜外卷和折叠医疗架可用部件作为外置隔离、待清洁 / 待安装组件。
  - 批准无菌电源接口 / 线束因灰白残片接触而放弃，本章不取得该组件。
  - 批准灰白藤体残片仍未采样、未判定、未成为可用材料，不能直接进入生活区。
  - 批准声音拟态升级为假陆沉舟上车指令，但外部仍不知道房车系统正式名称。
state_changes:
- 陆沉舟制定三分钟短窗口取材路线，继续保持房车发动、撤离线和车门锁闭。
- 林知夏完成第一个医疗位材料判断场景：隔离膜外层污染可剥离，折叠医疗架可取可用部件，无菌电源线束被污染后必须放弃。
- 车组取得污染隔离膜外卷和折叠医疗架可用部件，两者都挂在车外后挂架外置隔离，未进入生活区。
- 无菌电源接口 / 线束被灰白残片接触，判定污染后放弃。
- 简易医疗位材料条件推进到大半，但模块仍未安装、未启动、未解锁。
- 净雾滤芯低效稳定窗口从约14分钟缩短到约6分钟；车尾临时封堵在外部操作中继续承压。
- 灰白藤体残片仍未采样、未判定，没有成为可用材料。
- 腹部出血男人和低烧孩子继续留在车外，按灯光 / 闭嘴 / 不越线规则保留生存窗口，未上车。
- 外仓侧门远程开启，广播用陆沉舟声音发出“门开了，上车”的假指令，声音拟态升级到命令级诱导。
