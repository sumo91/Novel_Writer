entries:
- chapter: 1
  promises_made: []
  payoffs_delivered:
  - 迷雾封锁第一座高速服务区，陆沉舟用救援经验组织短暂撤离并遭遇第一批雾尸；父亲留下的破旧房车激活旧救援协议，发布清理 C 区加油口、取得净雾滤芯组件的第一个路标任务。
  frustration_level: controlled
  payoff_types: []
  delayed_payoffs: []
  risks: []
- chapter: 2
  promises_made: []
  payoffs_delivered:
  - 陆沉舟在第一服务区外面对抢油和上车逼迫，林知夏正式登场并用分诊识别污染疑似者；两人合作清理 C 区加油口，取得净雾滤芯核心过滤件，陆沉舟公开第一条上车规则：上车不是被救，是签约。
  frustration_level: controlled
  payoff_types: []
  delayed_payoffs: []
  risks: []
- chapter: 3
  promises_made: []
  payoffs_delivered:
  - 陆沉舟在第一服务区围堵中执行上车规则，林知夏以急诊分诊和污染观察能力签约上车；两人用临时加压固定启动净雾滤芯，房车第一次冲入迷雾，并锁定 17 公里外的青河服务区与可解锁模块简易医疗位。
  frustration_level: controlled
  payoff_types: []
  delayed_payoffs: []
  risks: []
- chapter: 4
  promises_made:
  - 受伤女孩知道青河服务区有电且广播是真的，但完整警告尚未说出。
  - 雾犬已经咬住房车后部，第5章必须处理追车和车辆损伤。
  payoffs_delivered:
  - 上车规则第一次出现明确拒绝案例：救助不等于整车上车。
  - 林知夏的道路初筛功能落地。
  - 雾犬作为道路速度型怪物实体登场。
  frustration_level: controlled
  payoff_types:
  - rule_payoff
  - teammate_function_payoff
  - monster_escalation
  delayed_payoffs:
  - 青河服务区内部情况
  - 受伤女孩完整警告
  - 雾犬弱点与材料价值
  risks:
  - 临时观察伤员可能消耗医疗资源或带来污染观察压力。
  - 雾犬持续拖拽可能进一步破坏密封和滤芯固定。
- chapter: 5
  promises_made:
  - 青河服务区外仓可能有密封胶、备用卡箍和隔离帘材料，但外仓是否安全、谁控制物资尚未揭开。
  payoffs_delivered:
  - 雾犬追车压力兑现，陆沉舟用急刹、转向和废弃货车底盘撕脱雾犬。
  - 林知夏确认早期雾犬诱因：血腥味和净雾滤芯车尾排气/后部 venting。
  - 房车逃脱但付出可见代价：后保险杠断裂，密封完整度降至 72%，滤芯效率降至 23%。
  frustration_level: controlled
  payoff_types:
  - monster_rule_payoff
  - road_action_payoff
  - resource_cost
  delayed_payoffs:
  - 青河服务区内部情况
  - 外仓物资控制者
  - 受伤女孩完整警告
  - 雾犬更完整生态和可反制方法
  risks:
  - 车尾密封不足会让雾味渗入，持续压低安全余量。
  - 受伤女孩的血味可能再次吸引雾犬。
  - 先修车会压缩伤员治疗窗口。
- chapter: 6
  promises_made:
  - 青河外仓有净化耗材、基础医疗耗材、密封胶和修车胶，但钥匙或门禁卡由老郑控制。
  - 外仓木牌显示“拿物资可以 / 上车不行”，第7章必须处理物资交易和上车资格切割。
  payoffs_delivered:
  - 林知夏建立外伤、雾吸入、疑似异变三档临时污染分诊。
  - 陆沉舟将分诊转化为车内规则：临时观察区不等于生活区，观察窗口不等于正式上车名额。
  - 房车抵达青河服务区外仓接近口，确认目标物资可能存在但未免费获得。
  frustration_level: controlled
  payoff_types:
  - rule_payoff
  - teammate_function_payoff
  - route_hook
  delayed_payoffs:
  - 青河外仓物资是否能取得
  - 老郑身份和控制方式
  - 简易医疗位解锁
  - 周小禾完整青河警告
  risks:
  - 周小禾可能继续恶化或被误判。
  - 临时观察区不具备医疗隔离标准。
  - 外仓物资可能与上车资格发生交换压力。
- chapter: 7
  promises_made:
  - 老郑广播房车位置，雾中车灯、金属敲击声和抢车压力正在向外仓口聚集。
  - 新取得的密封胶、卡箍、隔离材料、医疗耗材和滤芯边料都只能支撑临时处理，仍需在第8章寻找封堵和突围窗口。
  payoffs_delivered:
  - 第6章外仓物资和老郑控制权兑现：老郑以燃油、药品、密封胶、卡箍、帘布和滤芯边料逼房车开门。
  - “物资不是船票”规则兑现：陆沉舟拒绝让资源购买生活区和正式上车资格，只允许有限交易。
  - 林知夏资源验收功能兑现：识别药箱缩水、材料污染、缝合线和手套需求，并判断老郑灰眼兄弟疑似异变。
  - 房车获得有限可用物资，但没有完成修复、恢复滤芯效率或解锁医疗模块。
  frustration_level: controlled
  payoff_types:
  - rule_payoff
  - resource_payoff_with_cost
  - teammate_function_payoff
  - human_pressure_hook
  delayed_payoffs:
  - 青河主楼或内部秩序
  - 简易医疗位解锁
  - 周小禾是否恶化或稳定
  - 老郑灰眼兄弟是否彻底异变
  - 广播引来的抢车者身份和规模
  risks:
  - 房车位置和净化滤芯价值已被广播，外部抢车者正在聚集。
  - 车尾密封仍未实际修好，长时间停留会继续增加雾中目标聚集风险。
  - 新物资外包装存在污染，需要隔离处理，不能直接进入生活区。
  - 老郑仍掌握外仓和广播系统，短期敌对未解决。
- chapter: 8
  promises_made:
  - 第9章必须处理正式抢车夜：旧面包车路障、撬棍/灭火器抢车者、车尾线束被拉扯和雾犬逼近。
  - 临时封堵和滤芯短时稳定都有持续时间限制，剧烈冲撞可能破坏车尾状态。
  payoffs_delivered:
  - 第7章广播报点后果兑现：外部车辆、人声、敲击和抢车者聚集到外仓口。
  - 净雾滤芯消耗限制兑现：低效滤芯和后部漏雾让停留成为污染倒计时。
  - 第7章有限物资兑现为临时撤离窗口：密封胶、卡箍、帘布和滤芯边料只提供短时补强。
  - 林知夏车内功能兑现：隔离污染外包装并对周小禾完成最低限度伤口固定。
  frustration_level: controlled
  payoff_types:
  - resource_payoff_with_cost
  - rule_pressure
  - monster_escalation
  - chapter_handoff
  delayed_payoffs:
  - 抢车夜正面冲突如何解决
  - 临时封堵能撑多久
  - 周小禾是否稳定或恶化
  - 雾犬是否会再次攻击车尾
  - 青河主楼和简易医疗位线索
  risks:
  - 车体临时封堵受力不稳定。
  - 抢车者已经开始堵路和拉扯车尾线束。
  - 雾犬被人类噪音吸引并逼近。
  - 周小禾伤口只做最低限度固定。
- chapter: 9
  promises_made:
  - 第10章必须处理青河广播：医疗电源、幸存者、不要开外仓门，以及天亮前驶离回压区的路线选择。
  - 净雾滤芯短时稳定校准和车尾临时封堵都有时间限制，不能支撑长时间停留。
  payoffs_delivered:
  - 第8章旧面包车路障和抢车夜压力兑现为正面夜袭。
  - 车门规则实战兑现：假求救、撬门、强光、抢滤芯和拉线束都没有换开门。
  - 林知夏车内功能兑现：她在战斗压力下守住观察区、隔离箱、污染外包装和周小禾。
  - 雾犬生态小规则兑现：抢车者制造的噪音和灯光引来雾犬并反噬他们。
  - 系统有限奖励兑现：车内协同规则初步成立，净雾滤芯进入短时稳定校准。
  frustration_level: controlled
  payoff_types:
  - rule_payoff
  - teamwork_payoff
  - monster_rule_payoff
  - limited_system_payoff
  - route_hook
  delayed_payoffs:
  - 青河医疗电源是否真实可用
  - 青河主楼幸存者身份与风险
  - 不要开外仓门警告的含义
  - 临时封堵和滤芯稳定能撑多久
  - 简易医疗位是否能被解锁
  risks:
  - 车尾临时封堵损耗增加，正式修复仍未完成。
  - 滤芯只是低效稳定，长时间停留会重新积累污染风险。
  - 回应青河广播可能进入第二个陷阱或更深服务区风险。
  - 周小禾仍需后续医疗处理，不能承受长期拖延。
- chapter: 10
  promises_made:
  - 第11章必须处理青河医疗点外围、二号配电箱、外仓门禁异常和简易医疗位材料信号。
  - “他们会学声音”的警告必须在后续用具体威胁或误导方式兑现，不能只做空泛悬念。
  - 低效滤芯和车尾临时封堵仍有时间与污染压力，不能支撑长时间青河停留。
  payoffs_delivered:
  - 第9章青河求救广播得到正面处理：陆沉舟测试循环、信号、灯光反应和具体信息，而不是盲目相信。
  - 第一站闭环兑现：房车离开旧路障区，穿过第一段低浓度迷雾，抵达青河服务区医疗点外缘。
  - 车内规则推进兑现：外部求救接触规则成立，医疗电源和幸存者信息不能绕过车门边界。
  - 林知夏功能队友兑现：她明确留车并承担医疗观察、污染分诊和隔离区职责。
  - 简易医疗位从早期承诺推进为可争取的下一站模块线索，但仍未解锁。
  frustration_level: controlled
  payoff_types:
  - unit_closure
  - rule_payoff
  - teammate_function_payoff
  - route_hook
  - module_hook
  delayed_payoffs:
  - 简易医疗位是否能解锁
  - 青河医疗电源是否真实可用
  - 青河主楼幸存者身份与风险
  - 外仓门禁异常和“欢迎回来”的含义
  - 声音模仿威胁的具体生态规则
  risks:
  - 青河污染等级正在上升。
  - 外仓门禁状态异常，开门请求可能是陷阱。
  - 低效滤芯窗口有限，车尾封堵仍不稳。
  - 回应广播已经引起外部声源和敲击反应。
- chapter: 11
  promises_made:
  - 第12章必须处理欺骗环境下的分诊选择：墙内疑似活人、门口假孩子、材料位置和撤离线不能同时满足。
  - 二号配电箱、折叠医疗架、隔离膜和电源接口必须在后续通过污染判定、接触成本或交换风险才能转化为材料收益。
  - 声音拟态已经能使用名字和熟人声音，后续必须继续影响车外沟通规则，不能只当单章惊吓。
  - 欢迎回来 / 权限错误只能继续作为旧协议异常推进，不能突然改成父亲线硬揭示。
  payoffs_delivered:
  - 第10章“他们会学声音”的警告兑现为具体威胁：复读、叫名、模仿林知夏和假孩子诱饵。
  - 第10章青河医疗点材料信号得到验证：确认二号配电箱、折叠医疗架、隔离膜和电源接口线索。
  - 外部求救接触规则得到实战验证：不进楼、不开门、保撤离线、错误编号测试有效。
  - 林知夏功能价值再次兑现：她既能识别医疗材料，也能压住救人冲动完成污染分诊判断。
  frustration_level: controlled
  payoff_types:
  - rule_payoff
  - teammate_function_payoff
  - module_lead_payoff
  - monster_rule_payoff
  - triage_hook
  delayed_payoffs:
  - 简易医疗位是否能最低限度激活
  - 墙内敲击者身份和是否可救
  - 青河医疗点材料如何污染判定与取得
  - 声音拟态怪物的实体规则与反制方式
  - 权限错误 / 欢迎回来背后的旧协议机制
  risks:
  - 房车低效滤芯窗口有限，不能长时间停在青河医疗点外缘。
  - 车尾临时封堵和外仓门禁异常仍可能成为污染入口。
  - 外部声音会利用名字和熟人声线诱导开门，车外沟通风险上升。
  - 真实幸存者和假诱饵可能同时存在，错误分诊会导致死亡或开门事故。
- chapter: 12
  promises_made:
  - 第13章必须处理灰白雾藤 / 藤化伤员的实体威胁，不能停留在声音恐吓。
  - 灰白雾藤可能与医疗点敲击、声音拟态和污染伤口有关，后续要通过可观察行为推进，不写百科。
  - 车外短救已暴露房车有医疗能力，后续幸存者或怪物会继续利用医疗压力。
  - 简易医疗位材料仍未取得，后续必须通过污染判定、短窗口取材或交换风险推进。
  payoffs_delivered:
  - 第11章“谁先救”问题兑现为第一次青河车外分诊。
  - 林知夏功能爽点兑现：她用可观察信号而不是哭声大小决定救治顺序。
  - 外部求救接触规则升级兑现：灯线、不开门、不叫名、投送包和倒车撤离形成流程。
  - 医疗救助不能替代上车资格再次兑现：腹部出血男人得到有限止血指导但不能上车。
  - 声音拟态升级兑现：灰眼伤员借用孩子声音，说明威胁进入人体 / 伤员现场。
  frustration_level: controlled
  payoff_types:
  - rule_payoff
  - teammate_function_payoff
  - medical_triage_payoff
  - monster_escalation
  - chapter_handoff
  delayed_payoffs:
  - 灰白雾藤的触发条件、攻击方式和弱点
  - 灰白雾藤残片是否可用于医疗位隔离材料
  - 青河医疗点材料如何取得
  - 墙内敲击者身份和能否救出
  - 简易医疗位最低限度启动
  risks:
  - 房车低效滤芯窗口继续缩短。
  - 短暂开窗投送物资带来空气压力波动。
  - 车外幸存者知道房车有医疗能力，后续可能加剧道德绑架和抢夺压力。
  - 灰白雾藤可能模仿声音并向医疗物资 / 活人移动，威胁升级。
- chapter: 13
  promises_made:
  - 第14章必须处理污染残片隔离采样、医疗材料争夺和短滤芯窗口三重压力。
  - 灰白雾藤残片可能有材料价值，但不能未经隔离判定直接上车或启动模块。
  - 青河后墙 / 二号配电箱附近的医疗材料信号增强，下一章必须给出取材路线或代价。
  payoffs_delivered:
  - 第12章灰白雾藤钩子兑现为实体藤化伤员威胁。
  - 陆沉舟完成第一次不开门、不下车的藤化反制。
  - 林知夏污染观察线兑现为战斗 / 生存价值，识别藤体可观察触发因素。
  - 投送包污染和工具放弃兑现了资源代价，防止医疗救助变成免费收益。
  - 简易医疗位材料线从“外部线索”推进到“污染残片候选 + 后墙材料信号”。
  frustration_level: controlled
  payoff_types:
  - monster_escalation
  - rule_payoff
  - teammate_function_payoff
  - resource_pressure
  - upgrade_hook
  delayed_payoffs:
  - 灰白藤体残片能否真正用于简易医疗位隔离材料
  - 二号配电箱旁医疗材料如何取得
  - 墙内敲击者是人、诱饵还是二者混杂
  - 简易医疗位最低限度启动
  risks:
  - 净雾滤芯低效稳定窗口约剩14分钟。
  - 车外可控者仍未安全转移。
  - 污染残片挡在材料线附近，采样或取材都可能扩大污染。
  - 车外声音和藤体继续学习救治流程与指令声。
- chapter: 14
  promises_made:
  - 第15章必须处理外仓侧门远程开启、假陆沉舟上车指令、幸存者被诱导移动和雾犬围站压力。
  - 简易医疗位材料已取得大半，但仍需要清洁、安装、电源 / 权限补足和安全窗口。
  - 外置隔离材料挂在车外后挂架，后续撤离和污染处理会形成新压力。
  payoffs_delivered:
  - 第13章“污染残片和医疗材料短窗口争夺”兑现为三分钟取材行动。
  - 简易医疗位材料线从可见线索推进到隔离膜外卷和折叠医疗架可用部件到手。
  - 林知夏材料判断爽点兑现：她拒绝污染线束，区分样本、污染件和可用组件。
  - 模块成长代价兑现：滤芯窗口从约14分钟掉到约6分钟，车尾封堵继续承压，工具和材料只能外置隔离。
  - 声音拟态升级兑现：假陆沉舟声音发出“门开了，上车”的命令级诱导。
