events:
- id: t001
  when: 第 1 章
  summary: 迷雾封锁第一座高速服务区，陆沉舟用救援经验组织短暂撤离并遭遇第一批雾尸；父亲留下的破旧房车激活旧救援协议，发布清理 C 区加油口、取得净雾滤芯组件的第一个路标任务。
- id: t002
  when: 第 2 章
  summary: 陆沉舟在第一服务区外面对抢油和上车逼迫，林知夏正式登场并用分诊识别污染疑似者；两人合作清理 C 区加油口，取得净雾滤芯核心过滤件，陆沉舟公开第一条上车规则：上车不是被救，是签约。
- id: t003
  when: 第 3 章
  summary: 陆沉舟在第一服务区围堵中执行上车规则，林知夏以急诊分诊和污染观察能力签约上车；两人用临时加压固定启动净雾滤芯，房车第一次冲入迷雾，并锁定 17
    公里外的青河服务区与可解锁模块简易医疗位。
- id: t004
  when: 第 4 章
  summary: 房车离开第一服务区后，被拒幸存者追车逼停，陆沉舟执行有限救援，只接收一名通过林知夏初筛且服从指令的受伤女孩进入临时观察，拒绝整车风险转嫁；随后面包车撞上护栏，第一只雾犬咬住房车后保险杠。
- id: t005
  when: 第 5 章
  summary: 雾犬咬住房车后保险杠并被血味与滤芯排气吸引，陆沉舟利用急刹、转向和废弃货车底盘撕脱雾犬，代价是后保险杠断裂、车体后部密封下降至72%、滤芯效率降至23%。林知夏确认血味和车尾排气是早期诱因，伤员仍需尽快处理，路线被迫转向青河服务区外仓接近口寻找密封胶、卡箍和隔离帘材料。
- id: t006
  when: 第 6 章
  summary: 房车抵达青河服务区外仓接近口前，周小禾出现发冷、渗血和瞳孔灰边等疑似污染体征。林知夏建立外伤、雾吸入、疑似异变三档临时污染分诊，陆沉舟将其转成车内规则：临时观察区不等于生活区，上车名额与观察窗口分开。两人用旧帘布、急救箱、塑封袋和绳索搭出临时观察区。周小禾提供青河后仓线索：净化耗材、医疗材料和修车胶在后仓，但钥匙或门禁卡由仓库控制者老郑掌握。房车停在外仓口，看见锁链、拖痕和写着拿物资可以、上车不行的木牌，下一章进入物资与上车资格切割。
- id: t007
  when: 第 7 章
  summary: 陆沉舟在青河外仓门口与物资控制者老郑谈判，拒绝用上车资格交换燃油、药品和修车材料，只以有限交易换取密封胶、卡箍、隔离帘、基础医疗耗材、少量燃油和滤芯边料；林知夏验货并判定老郑的灰眼兄弟疑似异变，陆沉舟坚持不上车规则。老郑随后广播房车位置，引来雾中车灯和抢车压力。
- id: t008
  when: 第 8 章
  summary: 老郑广播房车位置后，青河外仓灯光逐盏熄灭，雾墙从出口方向回压，低效净雾滤芯和车尾漏雾让停留变成污染倒计时。陆沉舟用第7章取得的密封胶、卡箍、帘布和滤芯边料完成临时封堵与短时补强，林知夏隔离污染外包装并对周小禾做最低限度伤口固定。外部抢车者开始堵路、拉扯车尾线束，金属敲击又引来雾犬；房车挤出外仓口，正面进入抢车夜。
- id: t009
  when: 第 9 章
  summary: 房车在青河外仓口外侧主路遭遇旧面包车路障和抢车小团体夜袭。陆沉舟拒绝开门，用车灯、喇叭、破拆钩、倒车角和车身重量守住驾驶位与车门规则；林知夏守住周小禾临时观察区、隔离帘和污染材料。抢车者制造的噪音与强光引来雾犬，阵形被反噬，房车冲出第一轮围堵。系统判定车内协同规则初步成立，净雾滤芯进入短时稳定校准，但雾墙回压仍在扩大，青河广播传来医疗电源与幸存者求救。
- id: t010
  when: 第 10 章
  summary: 房车打退抢车夜后接到青河求救广播。陆沉舟不盲目开门救援，而是测试广播真假、建立外部求救接触规则，并带车以低效稳定滤芯穿过第一段低浓度迷雾，受控靠近青河医疗点外缘。林知夏明确以医疗观察和污染分诊角色留车；系统提示简易医疗位材料疑似位于青河医疗点，但青河污染等级上升、外仓门禁异常。
- id: t011
  when: 第 11 章
  summary: 陆沉舟在青河医疗点外缘不开门、不进楼，用错误编号测试拆出假声与更可信的墙内回应，确认二号配电箱、折叠医疗架、隔离膜和电源接口等简易医疗位线索。林知夏在观察周小禾伤情的同时识别医疗材料价值，并拒绝被模仿声音和假孩子诱导开门；章节以假孩子无脚印、后墙仍有闷敲收束，推动第12章进入欺骗环境下的分诊选择。
