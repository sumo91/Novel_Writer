characters:
  lu_chenzhou:
    display_name: 陆沉舟
    physical_state: 仍在驾驶位控制房车，保持车门关闭、撤离角度、车灯分区和短窗缝操作；取材后将污染工具留在窗外，材料挂在车外后挂架外置隔离。
    social_state: 从藤化反制现场指挥推进为短窗口取材路线设计者，用三分钟路线、放弃条件和车灯命令维持房车边界。
    emotional_state: 面对近在眼前的医疗位材料没有贪全，能接受放弃被污染的无菌电源线束；对假陆沉舟指令立刻收回外部命令权。
    current_goal: 带着外置隔离材料撤出当前高风险区域，同时防止幸存者被假指令诱导贴车或上车。
    known_secrets: &id001 []
    public_knowledge: &id002
    - 简易医疗位材料可以推进，但任何材料必须经过外置隔离、清洁和安装条件，不能直接进入生活区。
    - 外部出现的陆沉舟声音不具备命令权，只有车内确认规则有效。
    relationship_changes: &id003
    - 与林知夏形成更稳定取材分工：他负责路线、车辆和放弃时机，她负责材料污染判断。
    voice_notes: &id004
    - 短、硬、以时间和条件为主；“三分钟”“所以不拿完”“谁听声音上车，谁留在外面”体现边界。
    last_updated_chapter: 14
    history:
    - display_name: 陆沉舟
      physical_state: 手背烫伤、指节有血，正在驾驶房车穿过低浓度迷雾。
      social_state: 车内规则执行者和司机，已让林知夏按契约上车。
      emotional_state: 冷静压住旧救援本能，坚持救助和上车资格分离。
      current_goal: 稳定净雾滤芯临时状态，驶向 17 公里外的青河服务区。
      known_secrets: []
      public_knowledge:
      - 房车系统会给出滤芯、穿雾窗口和下一路标提示。
      relationship_changes:
      - 与林知夏形成车内医疗/污染观察与驾驶撤离的初步分工。
      voice_notes:
      - 以短指令拆分救助、上车、隔离和撤离。
      last_updated_chapter: 3
      chapter: 3
    - display_name: 陆沉舟
      physical_state: 正驾驶房车摆脱雾犬追咬，车辆后部受力异常。
      social_state: 继续作为房车司机和规则执行者，把救助、上车和临时观察分开处理。
      emotional_state: 被旧商场火灾救援事故轻触发，但用现场判断压住情绪，没有被道德绑架拖回旧模式。
      current_goal: 脱离雾犬追咬，保护房车后部密封和临时滤芯固定，继续驶向青河服务区。
      known_secrets: []
      public_knowledge:
      - 被拒幸存者可能会把道德压力升级为追车、抢门和抢车。
      relationship_changes:
      - 与林知夏进一步形成“司机控制风险、医疗判断准入”的分工。
      voice_notes:
      - 短指令、低解释，以距离、停车点和门锁控制局面。
      last_updated_chapter: 4
      chapter: 4
    - display_name: 陆沉舟
      physical_state: 驾驶房车甩脱第一只雾犬，车辆后保险杠断裂，车尾密封不足。
      social_state: 继续作为房车司机和规则执行者，在修车优先与伤员医疗之间做路线取舍。
      emotional_state: 压住旧救援本能和伤员压力，选择先保证房车能继续跑。
      current_goal: 尽快抵达青河服务区外仓接近口，寻找密封胶、备用卡箍和隔离帘材料。
      known_secrets: []
      public_knowledge:
      - 雾犬会被血腥味和净雾滤芯车尾排气/后部 venting 吸引。
      relationship_changes:
      - 与林知夏形成“她判断伤情和诱因，他决定路线和车辆风险”的更明确分工。
      voice_notes:
      - 短指令、低解释，把恐慌压成路线、修车和隔离任务。
      last_updated_chapter: 5
      chapter: 5
    - display_name: 陆沉舟
      physical_state: 驾驶房车抵达青河服务区外仓接近口并停在路口外侧，车辆不熄火。
      social_state: 继续作为房车规则执行者，把临时观察区、生活区和正式上车资格分开。
      emotional_state: 在周小禾疑似污染和外仓物资诱惑之间保持冷静，用规则压住恐慌和交易风险。
      current_goal: 在不让上车资格被物资绑架的前提下，取得密封胶、备用卡箍、隔离帘材料和基础医疗耗材。
      known_secrets: []
      public_knowledge:
      - 周小禾提供青河后仓线索，老郑掌握钥匙或门禁卡。
      relationship_changes:
      - 进一步采纳林知夏的污染分诊规则，并将其转化为车内可执行边界。
      voice_notes:
      - 短句、规则化、任务化，要求能执行的等级和后果。
      last_updated_chapter: 6
      chapter: 6
    - display_name: 陆沉舟
      physical_state: 驾驶房车停在青河服务区外仓路口外侧，车未熄火，车尾密封仍不足。
      social_state: 从车内规则执行者推进为末日交易规则制定者，公开把物资交易与上车资格切开。
      emotional_state: 在车辆漏雾、周小禾需要处理和老郑资源绑架之间保持冷硬克制，用验货和定价压住风险。
      current_goal: 带着有限且污染风险未清的物资离开外仓口，摆脱被广播位置后聚集而来的抢车压力，并寻找临时封堵窗口。
      known_secrets: []
      public_knowledge:
      - 老郑只是青河外仓物资控制者，掌握门、锁链和即时补给，不代表完整青河秩序。
      - 物资可以交易、检验和定价，但不能直接买房车生活区或正式上车资格。
      relationship_changes:
      - 继续采纳林知夏的医疗和污染判断，让她在交易中负责验药、验隔离材料和判断疑似异变。
      voice_notes:
      - 短句、可计价、边界清楚；用“交易是交易，上车是上车”压住资源绑架。
      last_updated_chapter: 7
      chapter: 7
    - display_name: 陆沉舟
      physical_state: 驾驶房车从青河外仓口挤出，手背被断裂金属划伤，车辆侧后视镜受损，车尾临时封堵仍在受力。
      social_state: 继续作为司机和车门规则执行者，把外部喊话、堵路和抢车压力挡在车外。
      emotional_state: 冷静但压迫感上升，明确拒绝完美修复和外部谈判，用短时窗口换撤离。
      current_goal: 在临时封堵和滤芯短时稳定失效前，通过主路路障和抢车者包围，保住房车进入下一段道路。
      known_secrets: []
      public_knowledge:
      - 低效滤芯和后部漏雾会把长时间停留变成污染倒计时。
      - 第7章物资只能支持临时封堵和短时补强，不足以完整修复房车。
      relationship_changes:
      - 继续依赖林知夏处理车内污染包装、周小禾伤口和观察区稳定，自己专注车辆窗口和突围路线。
      voice_notes:
      - 倒计时式、阈值式、路线式；核心判断是“不修完，修到能走”。
      last_updated_chapter: 8
      chapter: 8
    - display_name: 陆沉舟
      physical_state: 驾驶房车冲出旧面包车路障，车辆右侧与车尾继续受擦碰和临时封堵承压影响。
      social_state: 作为司机和车门规则执行者，第一次把房车作为移动战术空间使用，并在夜袭中守住驾驶位和车门边界。
      emotional_state: 冷静、压迫感未退；不被假求救和抢车者道德绑架，同时避免无差别碾压。
      current_goal: 在天亮前离开雾墙回压区，并判断青河医疗电源广播是否值得冒险回应。
      known_secrets: []
      public_knowledge:
      - 抢车者的目标是车门、滤芯和驾驶位，不是正当救援。
      - 人类噪音、强光和金属敲击会把雾犬引向最响最亮的目标。
      relationship_changes:
      - 与林知夏形成第一次真正车组式协同：他控制外部路线和车门规则，她控制车内观察区和污染隔离。
      voice_notes:
      - 短、硬、路线判断；用规则和空间反制，不用长篇道德辩论。
      last_updated_chapter: 9
      chapter: 9
    - display_name: 陆沉舟
      physical_state: 连续驾驶房车甩开抢车夜并穿过低浓度迷雾，仍在方向盘前保持撤离角度，车辆震动和车尾封堵压力未解除。
      social_state: 从车门规则执行者推进为车组外部求救接触规则制定者，明确先验证、保撤退线、不盲目开门。
      emotional_state: 冷静克制，不被医疗电源和幸存者广播牵着走；仍保留救援判断，但拒绝让求救替代规则。
      current_goal: 在不进入青河主楼、不贴外仓门的前提下，验证青河医疗点、电源和简易医疗位材料线索。
      known_secrets: []
      public_knowledge:
      - 青河广播包含循环内容和疑似真人插话，不能直接相信。
      - 车头朝撤离方向、隔窗验证、不开外门，是回应外部求救的最低规则。
      relationship_changes:
      - 正式把林知夏视为车组医疗观察 / 污染分诊 / 隔离区负责人，而不是普通乘客。
      voice_notes:
      - 短、硬、验证优先；把救援诱惑拆成路线、门禁、撤离线和污染边界。
      last_updated_chapter: 10
      chapter: 10
    - display_name: 陆沉舟
      physical_state: 坐在驾驶位保持发动机运行和撤离角度，通过灯光、外放、车门锁和短距离倒车控制接触风险。
      social_state: 将第10章建立的外部求救接触规则落地为可执行流程，不让医疗资源、幸存者敲墙或孩子哭声绕过车门规则。
