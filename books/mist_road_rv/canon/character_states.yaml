      emotional_state: 认可规则的生存价值，但仍关注可救助者的处置。
      current_goal: 在车内建立伤员、疑似污染和急救耗材的基本处置秩序。
      known_secrets:
      - 房车净雾滤芯能短时改善车内空气。
      public_knowledge:
      - 林知夏能做急诊分诊和污染疑似判断。
      relationship_changes:
      - 与陆沉舟达成“你开车，我管车内伤员和疑似污染”的分工。
      voice_notes:
      - 用急诊判断压住情绪争吵，先说风险和处置。
