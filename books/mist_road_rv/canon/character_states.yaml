      current_goal: 在不下车、不进楼、不失去撤离线的前提下，确认青河医疗点哪些线索可信，并为下一步分诊接触制定顺序。
      known_secrets: []
      public_knowledge:
      - 外部声音会学习名字、复读指令，并可能模仿熟人声音。
      - 二号配电箱位于青河医疗点后墙，附近存在折叠医疗架、隔离膜和电源接口线索。
      relationship_changes:
      - 更明确地把林知夏当作医疗判断和污染边界的共同决策者，而不是只执行驾驶位规则的旁观者。
      voice_notes:
      - 短、硬、先验证；用错误问题、撤离线和门锁把救援冲动拆成可检验步骤。
      last_updated_chapter: 11
      chapter: 11
    - display_name: 陆沉舟
      physical_state: 仍在驾驶位控制房车，保持发动机运行、撤离角度、灯线边界、外放和倒车空间，短暂开窗投送物资后立即压住风险。
      social_state: 从验证规则的人推进为分诊现场安全框架搭建者，用车门、距离、灯光和投送流程把救助与上车资格切开。
