  lin_zhixia:
    display_name: 林知夏
    physical_state: 守在车内隔离位置，通过窗缝、隔离袋和夹杆完成材料外置判断；未下车，未让污染物进入生活区。
    social_state: 从污染机制观察者推进为医疗位材料判断者，证明她是房车医疗模块安全推进的必要角色。
    emotional_state: 对医疗材料有强烈职业敏感，但能主动放弃污染线束和破损件，不让“有用”压倒“安全”。
    current_goal: 保证已取得材料保持外置隔离，后续寻找清洁 / 安装 / 电源补足条件，同时继续守住周小禾观察需求。
    known_secrets: &id005
    - 周小禾仍需要更稳定医疗处理，简易医疗位材料推进越快越有价值，但不能以污染入车为代价。
    public_knowledge: &id006
    - 隔离膜外卷和折叠医疗架可用部件可进入待清洁 / 待安装状态；无菌电源线束污染后必须放弃。
    - 灰白残片是样本候选，不是可直接使用材料。
    relationship_changes: &id007
    - 她的功能价值从“救治和分诊”进一步扩展到“模块材料质量控制”。
    voice_notes: &id008
    - 专业、短句、有取舍；用“外层脏，不等于里面废”“线束污染，放弃”体现判断。
    last_updated_chapter: 14
