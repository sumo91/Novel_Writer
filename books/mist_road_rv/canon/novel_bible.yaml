premise: "迷雾污染降临，高速和国道被异变怪物吞没。退役消防救援队长陆沉舟开着父亲留下的破旧房车上路，绑定末日房车系统，通过路标任务和服务区补给点，把漏风破车升级成移动安全屋。"
platform_style: "tomato"
target_reader: "喜欢番茄爽文、末日生存、移动基地升级、公路关卡推进和清晰主角边界的读者。"
story_promise: "别人困在服务区等死，主角开着一辆会升级的房车横穿迷雾末日；每过一站，车更强，队伍更精，家的边界更清楚。"
protagonist_fantasy: "在末日现场保持专业判断，不被道德绑架，筛选值得上车的人，并把破旧房车一步步改造成能保护自己人的移动家园。"
tone: "快节奏、压力先行、规则生存悬疑、升级反馈明确；末日危险要硬，但车内家园感要逐步变暖。"
main_conflict: "迷雾污染、异变怪物、服务区秩序崩坏、幸存者道德绑架和不断进化的雾中生态，持续逼迫陆沉舟决定救谁、放弃谁、按什么规则带人继续上路。"
long_term_goal: "沿系统标记的生命线公路深入污染等级越来越高的雾潮路网，解锁房车模块，查明父亲最后一趟救援、母巢公路和雾心者的真相，并在终点面对一次无法简单命名为拯救或毁灭的选择。"
ending_direction: "陆沉舟从被旧事故困住的退役救援者，成长为能把规则、队友和移动家园开到迷雾终点的人；他最终理解父亲当年为什么停在终点，并用自己的边界和能力做出父亲当年无法完成的选择。"
hard_constraints:
  - "房车不是无敌堡垒；燃油、滤芯、车体损伤、污染累积和成员信任必须持续形成压力。"
  - "系统只提供路线、任务和模块奖励，不替主角做道德选择。"
  - "上车资格必须体现契约、价值和边界，不能无限收留。"
  - "开篇和新章节优先给场景压力，再解释迷雾、系统、服务区或人物过去。"
human_notes:
  - "Confirmed core mode: mobile safehouse爽文 with some national-road/life-line mystery."
  - "Confirmed protagonist mode: cold boundaries outside, protective home-keeper inside."
  - "Confirmed first teammate: emergency doctor/nurse with real survival value."
  - "Confirmed endgame direction: the road leads to a mother-hive highway and a special altered being, the fog-heart figure, who offers a morally difficult alternative to simply destroying the fog."
