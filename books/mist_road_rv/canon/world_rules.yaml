setting: "近现代中国高速、国道和城市边缘在迷雾污染中被切割成危险路段、临时服务区和孤立幸存者据点。"
power_system: "末日房车系统绑定陆沉舟父亲留下的破旧房车。系统通过路标任务、污染材料和服务区交易解锁模块，包括净雾滤芯、储物扩容、医疗位和防撞骨架。"
economy: "早期交换以燃油、药品、食物、净化滤芯、车辆零件、污染材料和路线情报为核心。服务区交易终端和幸存者黑市并存。"
organizations:
  - "服务区幸存者小团体"
  - "临时救援残余人员"
  - "物资控制者与黑市交易者"
  - "后续待定的公路秩序组织"
technology_level: "灾前现代科技仍可使用，但通讯、导航、照明和车辆设备会被迷雾干扰。系统模块可以在现实车辆基础上产生超常升级。"
social_rules:
  - "服务区是阶段性安全点，有临时屏障、维修位、交易终端和污染检测门，但不是绝对安全。"
  - "迷雾会干扰方向感、通讯、光源和情绪；长时间暴露会污染人体。"
  - "路标任务会临时标记可通行路线和奖励条件，完成任务才能获得更稳定的前进窗口。"
  - "车内秩序以契约和服从撤离规则为基础；上车不是无条件获救。"
hard_limits:
  - "房车安全空气受净雾滤芯数量、污染浓度和车体密封状态限制。"
  - "模块升级需要任务奖励、污染材料或服务区交易，不凭空获得。"
  - "异变怪物早期以雾尸、雾犬、藤化感染者等低阶威胁为主，强度随路段推进升级。"
  - "主角救援能力来自职业经验和现场判断，不等于能同时拯救所有人。"
