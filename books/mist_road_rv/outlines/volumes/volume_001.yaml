volume_id: volume_001
title: "第一条上车规则"
chapter_range:
  start: 1
  end: 50
volume_goal: "让破旧房车完成从临时避难工具到移动安全屋雏形的转变，建立陆沉舟的上车规则、第一批核心队友、早期怪物生态、服务区关卡循环和父亲旧路线的第一条硬线索。"
reader_promise: "每一站都有迷雾危机、怪物压力、幸存者筛选、资源争夺和房车模块回报；每一次救人与拒救都让陆沉舟的车内规则更锋利，也让房车更像一个能活下去的家。"
main_pressure:
  antagonist_or_force: "迷雾污染、异变怪物、服务区幸存者小团体、抢车者、资源短缺，以及系统路标任务对陆沉舟的持续推进。"
  pressure_type: "生存压力、道德绑架、路线封锁、车体升级需求、队伍规则磨合、父亲旧线索诱导。"
  escalation_path:
    - "1-10章：第一座服务区封锁，雾尸和雾犬逼出净雾滤芯，上车规则公开。"
    - "11-20章：青河服务区出现污染伤员和医疗资源争夺，林知夏的医疗位价值落地。"
    - "21-30章：收费站与堵车长队形成路障关卡，抢车团伙和雾化车祸怪物共同施压。"
    - "31-40章：废弃维修区与污染材料交易出现，房车防撞骨架和储物扩容进入升级闭环。"
    - "41-50章：高污染封锁路段检验移动安全屋模式，卷末打出父亲曾经进入同一路线的第一条实证。"
protagonist_progress:
  start_state: "陆沉舟独行、冷硬、拒绝再被救援者身份绑架，只想开着父亲留下的破旧房车离开事故阴影。"
  midpoint_state: "他承认自己仍会救人，但只救进入规则、服从撤离、能为车内生存负责的人。"
  end_state: "他拥有初步车内规则、第一核心队友、可持续升级的房车雏形，并决定不是逃离迷雾，而是沿父亲旧路线查下去。"
core_payoffs:
  - "净雾滤芯：房车第一次拥有稳定安全空气和短距离穿雾能力。"
  - "简易医疗位：林知夏从被救者变成车内不可替代功能位，污染识别和急救形成队伍爽点。"
  - "储物舱扩容：物资掌控感落地，主角不再被服务区人群和短缺牵着走。"
  - "防撞骨架：房车从能躲变成能冲，兑现公路片的武力升级感。"
  - "污染材料回收：怪物不只是危险，也成为升级资源，形成打怪与养车的正反馈。"
  - "第一条父亲线索：证明房车系统和陆沉舟父亲的最后一趟救援有关。"
major_reveal: "系统路标任务并非随机求生提示，而是在引导房车沿一条特定生命线公路前进；父亲留下的房车曾经进入过更高污染等级路段。"
volume_climax: "陆沉舟带着完成初阶升级的房车穿过高污染封锁路段，在抢车者、雾化路障怪物和幸存者道德绑架中证明：真正能持续活下去的不是无条件救援，而是有规则、有功能、有边界的移动安全屋。"
ending_hook: "卷末，房车终端读取到父亲旧救援编号和一段残缺行车记录：同一条路上曾有一辆旧房车驶向地图上不存在的国道，下一卷目标指向“国道生命线”。"
required_threads:
  - thread_rv_system_binding
  - thread_father_last_rescue
  - thread_service_area_terminals
  - thread_mist_monster_ecology
  - thread_lu_old_rescue_accident
  - thread_lin_pollution_observation
locked_rules_for_volume:
  - "卷一不揭开母巢公路和雾心者真相，只埋第一条父亲旧路线硬线索。"
  - "卷一房车升级以基础生存模块为主，不提前进入大规模武器化。"
  - "陆沉舟每次救援都要有边界成本，不能滑回无条件圣父。"
  - "林知夏入队必须靠功能价值和专业判断，不靠单纯被保护。"
  - "怪物威胁必须推动模块升级和路线选择，不能只是背景打斗。"
  - "服务区幸存者冲突要服务筛人、规则和资源，不做纯粹吵架拖章。"
upgrade_track:
  - module: "净雾滤芯"
    chapters: "1-10"
    function: "安全空气、短距离穿雾、第一次系统任务闭环。"
    cost_or_condition: "清理第一服务区 C 区加油口，取得滤芯组件和污染样本。"
  - module: "简易医疗位"
    chapters: "11-20"
    function: "急救、污染初筛、林知夏核心功能位。"
    cost_or_condition: "青河服务区医疗点材料、无菌电源组件、污染伤员分诊选择。"
  - module: "储物舱扩容"
    chapters: "21-35"
    function: "物资掌控、燃油和药品管理、交易议价权。"
    cost_or_condition: "收费站堵车带的冷链车电池、污染材料和系统奖励。"
  - module: "防撞骨架"
    chapters: "31-45"
    function: "冲撞路障、抵御雾犬群和雾化车祸怪物，形成武力成长爽点。"
    cost_or_condition: "废弃维修区钢材、异变犬骨质材料、维修工幸存者交易。"
  - module: "旧救援编号读取"
    chapters: "46-50"
    function: "读取父亲旧行车记录残片，打开第二卷国道生命线目标。"
    cost_or_condition: "穿越高污染封锁路段后接入旧服务区终端。"
monster_escalation:
  - stage: "雾尸"
    chapters: "1-10"
    pressure: "人形低阶感染者，动作迟缓但会被声音和光源吸引。"
    payoff: "建立迷雾污染可见危险，逼出净雾滤芯。"
  - stage: "雾犬"
    chapters: "1-20"
    pressure: "服务区流浪犬和宠物犬异变，嗅觉追车，速度快。"
    payoff: "逼迫房车密封、医疗处理和防撞需求。"
  - stage: "藤化伤员"
    chapters: "11-25"
    pressure: "污染伤口长出灰白雾藤，可能在救治中爆发。"
    payoff: "让林知夏的污染识别成为刚需。"
  - stage: "雾化车祸怪"
    chapters: "21-40"
    pressure: "被迷雾黏连的车辆残骸和人体污染体组成移动路障。"
    payoff: "推动储物、燃油、防撞和路线判断。"
  - stage: "路标诱饵"
    chapters: "41-50"
    pressure: "污染生态开始模拟路标、灯光和求救声，诱导车辆偏离。"
    payoff: "提示迷雾不是随机灾害，而具备道路组织性。"
team_track:
  - character: "陆沉舟"
    volume_function: "司机、规则制定者、现场指挥、房车系统绑定者。"
    movement: "从拒绝救援身份，到用车内契约重建自己的救援边界。"
  - character: "林知夏"
    volume_function: "急诊医疗、污染识别、车内道德镜面。"
    movement: "从被困服务区的专业幸存者，到获得简易医疗位并成为第一核心队友。"
  - character: "维修工候选队友"
    volume_function: "卷中后段出现，提供防撞骨架和车辆维修线索。"
    movement: "先作为交易对象或临时合作者，是否入队留到卷一后半判断。"
  - character: "被筛掉的幸存者代表"
    volume_function: "反复测试上车规则，制造道德绑架和抢车压力。"
    movement: "用失败案例证明车内规则不是装饰，而是生存条件。"
service_area_route:
  - chapters: "1-10"
    location: "第一座无名高速服务区"
    function: "开篇封锁、系统激活、净雾滤芯、林知夏登场、第一条上车规则。"
    exit_hook: "青河服务区检测到简易医疗位材料。"
  - chapters: "11-20"
    location: "青河服务区"
    function: "污染分诊、医疗资源冲突、雾犬袭击、简易医疗位解锁。"
    exit_hook: "旧导航出现被擦掉的国道编号。"
  - chapters: "21-30"
    location: "北岔收费站与堵车长队"
    function: "抢车团伙、雾化车祸怪、储物扩容材料、车内名额争议。"
    exit_hook: "维修区广播发出断续求救信号。"
  - chapters: "31-40"
    location: "废弃高速维修区"
    function: "维修资源交易、防撞骨架材料、污染材料回收、维修工候选队友。"
    exit_hook: "服务区终端识别出父亲旧救援编号。"
  - chapters: "41-50"
    location: "高污染封锁路段与旧服务区终端"
    function: "卷级压力总验收，移动安全屋模式成型，父亲线索落地。"
    exit_hook: "地图上不存在的国道生命线出现。"
act_breaks:
  - chapters: "1-10"
    function: "第一站闭环：系统激活、净雾滤芯、规则公开。"
    payoff: "房车能穿雾，林知夏上车。"
  - chapters: "11-20"
    function: "医疗与污染线闭环：让车内功能位不只是人数增加。"
    payoff: "简易医疗位解锁，污染识别成为队伍优势。"
  - chapters: "21-35"
    function: "资源与名额线闭环：房车空间、物资、燃油、规则都要经受争夺。"
    payoff: "储物扩容，陆沉舟拥有议价权。"
  - chapters: "36-50"
    function: "武力与谜团线闭环：房车必须能冲，父亲旧路线必须给实证。"
    payoff: "防撞骨架、旧救援编号、第二卷方向。"
approval_questions:
  - "是否认可卷一的核心奖励不是单次逃生，而是移动安全屋雏形成型？"
  - "是否认可 1-50 章的站点推进：第一服务区、青河服务区、收费站、维修区、高污染封锁路段？"
  - "是否认可卷一只给父亲旧路线第一条实证，不提前揭开雾心者和母巢公路？"
  - "是否认可怪物升级从雾尸、雾犬、藤化伤员、雾化车祸怪到路标诱饵？"
  - "是否认可下一步进入 arc_001 与 unit_0001 的细化，而不是直接写章节正文？"
approval:
