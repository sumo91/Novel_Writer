unit: 2
title: "第二站：青河医疗位"
chapter_range:
  start: 11
  end: 20
parent_arc: arc_001
unit_goal: "完成青河服务区医疗线闭环：房车在污染等级上升、外仓门禁异常和声音模仿威胁下进入青河医疗点外围，验证外部求救接触规则，让林知夏的医疗观察、污染分诊和有限救治价值真正落地，收集简易医疗位关键材料，并在撤离时用旧导航 / 终端异常把路线推向北岔收费站。"
stage_enemy: "青河服务区医疗点外围的污染伤员、会利用声音或广播误导的雾中威胁、雾犬群、试图把伤员和门禁风险转嫁给房车的幸存者、外仓门禁异常、低效滤芯窗口和车尾临时封堵压力。"
stage_payoffs:
  - "第10章建立的外部求救接触规则在青河医疗点经受第一次完整测试。"
  - "林知夏从车内医疗角色推进为不可替代的核心功能队友：分诊、污染识别、有限救治和医疗物资判断全部落地。"
  - "周小禾得到比临时观察更稳定的处理，但不因此自动成为正式队友或生活区成员。"
  - "简易医疗位材料被收集并完成最低限度启动，成为房车第二个核心生存模块。"
  - "藤化伤员登场，证明迷雾污染会通过伤口、情绪和错误救治爆发，不是普通感染。"
  - "声音模仿威胁得到场景验证，但不一次性解释完整怪物生态。"
  - "服务区终端 / 门禁异常轻轻推进旧救援协议线索，但不提前揭开父亲最后救援或母巢公路。"
  - "青河撤离后，旧导航给出被擦掉的国道编号或北岔收费站方向，进入下一路段。"
stage_end_hook: "简易医疗位最低限度启动后，旧导航 / 青河终端闪出一段被擦掉的国道编号和北岔收费站方向；堵车长队、储物扩容材料和更高等级道路风险进入下一单元。"
required_threads:
  - thread_vehicle_rules_contract
  - thread_lin_pollution_observation
  - thread_mist_monster_ecology
  - thread_rv_system_binding
  - thread_service_area_terminals
  - thread_father_last_rescue
unit_rules:
  - "11-20 章必须保持青河服务区为危险关卡，不写成安全基地或长篇内部政治。"
  - "简易医疗位必须通过材料、电源、分诊选择和撤离风险取得，不得由系统免费解锁。"
  - "林知夏的爽点来自专业判断和有限资源取舍，不来自无条件救所有人。"
  - "陆沉舟继续执行外部求救接触规则：先验证、保撤退线、不开未验证门、医疗价值不能压倒污染边界。"
  - "周小禾可以得到更好处理和更明确观察状态，但不得直接升为核心队友。"
  - "藤化伤员和声音模仿只能通过可观察行为推进，不写怪物百科。"
  - "服务区终端和旧协议异常只埋影子，不给父亲最后救援硬答案；卷一硬证据仍留到后段。"
  - "车尾临时封堵、低效滤芯、医疗耗材和燃油必须持续形成代价。"
chapters:
  - chapter: 11
    title: "青河服务区"
    function: "青河医疗点外围登场，验证第10章外部求救接触规则。"
    opening_hook: "房车斜停在青河医疗点外缘，电子门禁屏在“权限错误”和“欢迎回来”之间闪烁，广播循环里有人喘着气说：别开外仓门。"
    main_payoff: "陆沉舟不进主楼、不贴外仓门，只用外放和车灯验证医疗点后墙二号配电箱；林知夏确认青河确有简易医疗位关键材料，但入口周围存在污染伤员和声音诱导。"
    next_hook: "医疗点后墙传来敲击回应，雾里有人喊先救孩子；林知夏必须决定谁能车外处理、谁必须拒绝靠近。"
    state_obligation:
      - "青河医疗点外围正式进入场景。"
      - "外部求救接触规则第一次在青河执行。"
      - "简易医疗位材料确认为真实可争取线索，但未取得。"
  - chapter: 12
    title: "谁先救"
    function: "医疗分诊与道德压力正面碰撞。"
    opening_hook: "医疗点外的雾里被推出来三个人：一个低烧孩子、一个腹部出血男人、一个被绑住手腕的灰眼伤员，所有人都在喊林知夏先救自己。"
    main_payoff: "林知夏按外伤、雾吸入、疑似异变三档做车外分诊，救治可控者、拒绝危险接触者，并把专业判断转化为房车准入边界。"
    next_hook: "被拒的灰眼伤员忽然用另一个人的声音求救，医疗点内侧灰白雾藤从伤口边缘冒出。"
    state_obligation:
      - "林知夏完成第一次青河车外分诊。"
      - "医疗救助不能替代上车资格规则再次被确认。"
      - "声音模仿威胁从广播推进到人体 / 伤员现场。"
  - chapter: 13
    title: "灰白雾藤"
    function: "污染伤员异变为藤化伤员，怪物生态升级。"
    opening_hook: "灰眼伤员的绷带自己鼓起，伤口里钻出灰白细藤，细藤一边缠向药箱，一边学着孩子的声音喊疼。"
    main_payoff: "陆沉舟和林知夏联手识别藤化伤员的触发条件：伤口污染、情绪压力和错误接触会加速爆发；房车守住门，医疗点外场完成第一次藤化反制。"
    next_hook: "藤化伤员留下可用于医疗位隔离膜的污染残片，但残片必须先经过系统判定和林知夏处理，不能直接上车。"
    state_obligation:
      - "藤化伤员作为新怪物阶段登场。"
      - "推进 thread_mist_monster_ecology 和 thread_lin_pollution_observation。"
      - "污染残片成为简易医疗位材料候选，但仍需处理。"
  - chapter: 14
    title: "医疗位材料"
    function: "争夺无菌电源组件、折叠医疗架和污染隔离膜。"
    opening_hook: "系统标记的材料信号在医疗点后墙亮起，二号配电箱、折叠医疗架和隔离膜都在一条必须下车短取的污染走廊里。"
    main_payoff: "陆沉舟制定三分钟取材路线，林知夏判断哪些医疗材料能用、哪些已污染，车组取得简易医疗位大半材料，但付出滤芯窗口缩短和车尾封堵再承压的代价。"
    next_hook: "外仓方向的门禁忽然远程解锁，广播用陆沉舟的声音说：门开了，上车。"
    state_obligation:
      - "简易医疗位材料取得大半。"
      - "材料取得必须伴随滤芯 / 封堵 / 下车窗口代价。"
      - "声音模仿升级为模仿陆沉舟指令。"
  - chapter: 15
    title: "雾犬围站"
    function: "外部雾犬群压迫青河服务区，内部幸存者试图转嫁风险。"
    opening_hook: "医疗点外的金属敲击和广播误导引来雾犬群，几名幸存者趁乱把污染伤员往房车方向推。"
    main_payoff: "陆沉舟用车头角度、灯光和撤离线压住雾犬群，林知夏守住车外分诊线，二人第一次形成医疗点外部战术配合。"
    next_hook: "雾犬群被暂时甩开，医疗点里唯一稳定手术灯亮起，真人广播者提出交换：救一个关键伤员，换二号配电箱权限。"
    state_obligation:
      - "陆沉舟与林知夏完成青河医疗点战术配合。"
      - "幸存者转嫁风险被规则挡住。"
      - "二号配电箱权限成为下一章交易目标。"
  - chapter: 16
    title: "临时手术灯"
    function: "林知夏用简陋条件救治关键伤员，换取路线情报或组件。"
    opening_hook: "医疗点内侧的临时手术灯忽明忽暗，关键伤员躺在污染隔离布后，广播者只肯隔门说：救他，配电箱权限给你们。"
    main_payoff: "林知夏在不让伤员入车的条件下完成一次车外有限救治，证明医疗功能能带来非战斗爽点和交易价值；车组取得二号配电箱权限或无菌电源组件。"
    next_hook: "手术灯恢复时，青河终端弹出一串旧协议故障码，其中有一段与房车系统提示格式相似。"
    state_obligation:
      - "林知夏完成关键医疗功能展示。"
      - "二号配电箱权限 / 无菌电源组件到手。"
      - "服务区终端旧协议异常出现。"
  - chapter: 17
    title: "终端故障码"
    function: "青河服务区终端出现旧协议故障码，轻推系统与旧救援线。"
    opening_hook: "配电箱启动后，青河终端没有显示医疗点电量，而是跳出一串旧协议故障码：救援锚点失联，上一任司机权限残缺。"
    main_payoff: "陆沉舟确认青河终端与房车系统存在格式相近的旧协议痕迹，但信息残缺到无法指向父亲；他只截下故障码，优先完成医疗位装车。"
    next_hook: "故障码触发服务区隐藏广播，幸存者听见房车有权限，开始要求第二次签约上车。"
    state_obligation:
      - "推进 thread_service_area_terminals。"
      - "轻触 thread_father_last_rescue，但不得给父亲硬证据。"
      - "旧协议线索被记录为残缺故障码。"
  - chapter: 18
    title: "第二次签约"
    function: "新幸存者申请上车，规则升级为更明确的车内契约。"
    opening_hook: "青河幸存者听见终端承认房车权限后围到医疗点外，有人拿材料、有人带伤员、有人跪下求签约上车。"
    main_payoff: "陆沉舟把第一条上车规则升级成更明确的车内契约：功能、风险、服从、观察期和驱逐条件写清楚；林知夏参与定义医疗观察条款。"
    next_hook: "契约刚立，医疗位材料装车时出现污染反应，必须立刻启动简易医疗位进行隔离。"
    state_obligation:
      - "车内规则从口头命令升级为可执行契约条款。"
      - "林知夏参与定义医疗观察条款。"
      - "不因材料或伤员压力放开生活区。"
  - chapter: 19
    title: "医疗位启动"
    function: "简易医疗位完成最低限度安装，车内生存率提升。"
    opening_hook: "污染隔离膜一接入房车，系统提示材料反应异常；周小禾低热上升，医疗位必须在未完全安全的状态下试启动。"
    main_payoff: "陆沉舟和林知夏用无菌电源组件、折叠医疗架和污染隔离膜完成简易医疗位最低限度启动，周小禾得到稳定处理，林知夏正式成为第一核心功能队友。"
    next_hook: "医疗位启动后，旧导航同步刷新，出现一段被擦掉的国道编号和北岔收费站方向。"
    state_obligation:
      - "简易医疗位最低限度启动。"
      - "林知夏核心功能队友地位完成模块化兑现。"
      - "周小禾伤情稳定，但正式队友身份仍待后续判断。"
  - chapter: 20
    title: "被擦掉的国道编号"
    function: "青河撤离，旧导航与国道编号指向下一路段。"
    opening_hook: "青河服务区主楼方向传来雾犬群和藤化伤员混杂的撞击声，房车必须带着刚启动的医疗位撤离。"
    main_payoff: "房车冲出青河服务区，简易医疗位经受第一次撤离测试；旧导航闪出被擦掉的国道编号和北岔收费站，证明路线不是随机逃生。"
    next_hook: "前方北岔收费站堵车长队堵死路面，系统检测到储物舱扩容材料和抢车团伙活动迹象。"
    state_obligation:
      - "青河服务区医疗线闭环完成。"
      - "下一单元目标锁定北岔收费站、堵车长队和储物舱扩容。"
      - "父亲 / 旧救援协议线只留下路线异常影子，不揭示答案。"
approval_questions:
  - "是否认可 unit_0002 的核心闭环是青河医疗点、林知夏功能位、藤化伤员和简易医疗位最低限度启动？"
  - "是否认可 11-20 章不把青河写成安全基地，而是医疗资源、污染分诊、声音模仿和门禁异常的关卡？"
  - "是否认可简易医疗位必须通过材料、电源、分诊和撤离风险取得，不允许系统白送？"
  - "是否认可父亲线在本单元只用旧协议故障码 / 路线异常轻推，不提前给父亲最后救援硬证据？"
  - "是否认可第11章 brief 必须从医疗点外缘压力开场，而不是直接进入主楼或完整幸存者秩序？"
