unit: 1
title: "第一站：净雾滤芯"
chapter_range:
  start: 1
  end: 10
parent_arc: arc_001
unit_goal: "完成第一座无名高速服务区的开篇闭环：迷雾封路、房车系统激活、净雾滤芯到手、林知夏登场并证明价值、陆沉舟公开第一条上车规则，房车真正离开第一站并驶向青河服务区。"
stage_enemy: "第一座迷雾服务区内外的雾尸、雾犬、污染疑似者、抢车幸存者小团体、物资控制者和用伤员孩子逼迫收容的道德绑架者。"
stage_payoffs:
  - "陆沉舟的专业判断和冷硬边界立住。"
  - "房车系统绑定并发布第一个路标任务。"
  - "净雾滤芯组件取得、安装并验证。"
  - "林知夏通过急诊分诊和污染识别成为有功能价值的第一队友。"
  - "第一条上车规则公开，并经受被拒者、物资交易和抢车夜的测试。"
  - "房车第一次稳定穿雾，给出青河服务区和简易医疗位钩子。"
stage_end_hook: "青河服务区求救广播响起：检测到可解锁模块“简易医疗位”，但广播里同时出现污染伤员和雾犬围站的杂音。"
required_threads:
  - thread_rv_system_binding
  - thread_mist_monster_ecology
  - thread_lu_old_rescue_accident
  - thread_vehicle_rules_contract
  - thread_lin_pollution_observation
unit_rules:
  - "前 10 章必须始终有现场压力，不能用设定说明替代危机推进。"
  - "系统信息只在任务、奖励、危险提示时出现，不做长篇说明书。"
  - "陆沉舟拒绝救人必须有专业理由和风险成本，不能写成单纯冷血。"
  - "林知夏每次推进都要靠医疗、分诊、污染判断或情绪稳定功能。"
  - "怪物压力从雾尸推进到雾犬追车，但不提前出现藤化伤员大线。"
  - "每章至少交付一个可见爽点：判断、拒绝、资源、模块、战斗、规则或路线。"
chapters:
  - chapter: 1
    title: "迷雾封路，房车绑定"
    function: "开篇危机、主角专业性、系统激活。"
    opening_hook: "陆沉舟开着父亲留下的破旧房车上高速，服务区前方突发连环车祸，灰白迷雾像墙一样吞掉出口和导航信号。"
    main_payoff: "陆沉舟用救援经验组织短暂撤离、避开第一波雾尸，房车系统在父亲旧车上激活。"
    next_hook: "系统发布第一个路标任务：清理 C 区加油口，取得净雾滤芯组件，否则房车安全空气将在雾中耗尽。"
    state_obligation:
      - "记录房车系统首次激活。"
      - "开启 thread_rv_system_binding。"
  - chapter: 2
    title: "第一条上车规则"
    function: "林知夏登场，净雾滤芯任务启动，主角边界公开。"
    opening_hook: "服务区幸存者分裂，有人堵在房车门口要求陆沉舟带所有人走，也有人趁乱摸向油箱和驾驶室。"
    main_payoff: "陆沉舟与林知夏合作清理加油口，林知夏用分诊判断救下关键伤员并指出污染疑似者，净雾滤芯组件到手。"
    next_hook: "陆沉舟当众宣布第一条上车规则：上车不是被救，是签约；不听指挥的人只能留在车外。"
    state_obligation:
      - "林知夏进入核心队友候选状态。"
      - "推进 thread_vehicle_rules_contract。"
  - chapter: 3
    title: "房车第一次穿雾"
    function: "服务区突围，首次模块回报，下一服务区钩子。"
    opening_hook: "服务区小团体把伤员和孩子推到车前逼陆沉舟让出名额，同时有人故意敲击铁皮把雾尸引向房车。"
    main_payoff: "净雾滤芯启动，房车形成短时安全空气，陆沉舟驾驶破旧房车冲进雾墙并甩开第一波围堵。"
    next_hook: "系统弹出下一条路标：前方 17 公里，青河服务区；检测到可解锁模块“简易医疗位”。"
    state_obligation:
      - "净雾滤芯成为房车已解锁模块。"
      - "青河服务区作为下一站目标出现。"
  - chapter: 4
    title: "被拒绝的人"
    function: "展示规则代价，被拒幸存者制造反扑。"
    opening_hook: "房车刚驶出服务区外环，被拒绝的幸存者开着一辆冒烟面包车追上来，车窗里有人举着孩子和输液袋喊救命。"
    main_payoff: "陆沉舟识破对方借伤员逼停、实则想抢车的意图，只接收一个能服从指令且通过林知夏初筛的伤员，拒绝整车转嫁风险。"
    next_hook: "面包车撞上护栏后，雾里传来犬类低吼，第一只雾犬咬住房车后保险杠。"
    state_obligation:
      - "上车规则出现第一次拒绝案例。"
      - "推进 thread_lu_old_rescue_accident 的情绪触发。"
  - chapter: 5
    title: "雾犬追车"
    function: "怪物威胁从固定服务区扩展到道路追逐。"
    opening_hook: "雾犬贴着路面追车，牙齿刮出金属火星，净雾滤芯的倒计时却开始异常加速。"
    main_payoff: "陆沉舟利用高速路肩、警示锥和急刹摆尾甩开雾犬，林知夏确认雾犬会被血腥味和滤芯排气吸引。"
    next_hook: "房车系统提示：车体密封不足，若再次被追咬，滤芯效率将下降；附近服务区仓库可能有密封胶和备用件。"
    state_obligation:
      - "雾犬作为新怪物阶段出现。"
      - "推进 thread_mist_monster_ecology。"
  - chapter: 6
    title: "污染分诊"
    function: "林知夏提出污染疑似分级，和陆沉舟的撤离规则互相磨合。"
    opening_hook: "临时收进车里的伤员开始发冷、瞳孔发灰，车内其他人恐慌，要求陆沉舟立刻把人扔下车。"
    main_payoff: "林知夏建立初步污染分诊：外伤、雾吸入、疑似异变分开处理；陆沉舟设置临时隔离区，避免车内恐慌失控。"
    next_hook: "隔离伤员说出一个关键信息：服务区后仓有净化耗材，但钥匙在物资控制者手里。"
    state_obligation:
      - "建立临时污染观察规则。"
      - "推进 thread_lin_pollution_observation。"
  - chapter: 7
    title: "物资不是船票"
    function: "物资控制者试图用燃油和药品买断上车资格。"
    opening_hook: "服务区后仓门前，物资控制者带着油桶和药箱开价：给陆沉舟补给，但他和手下必须全员上车。"
    main_payoff: "陆沉舟把交易和上车资格切开，只换取密封材料和滤芯耗材，不接受不服从规则的人进车。"
    next_hook: "物资控制者翻脸，暗中把房车位置广播给被拒绝的人，夜里抢车小团体开始聚集。"
    state_obligation:
      - "明确燃油、药品、滤芯和上车资格的经济规则。"
      - "推进 thread_vehicle_rules_contract。"
  - chapter: 8
    title: "雾墙回压"
    function: "第一服务区污染浓度回升，逼迫房车必须立刻离开。"
    opening_hook: "服务区灯光一盏盏熄灭，雾墙从出口倒灌回来，系统提示净雾滤芯剩余效率不足以支撑长时间停留。"
    main_payoff: "陆沉舟判断留在服务区必死，带队抢修密封条、补充滤芯耗材，完成离站前最后准备。"
    next_hook: "抢车小团体趁夜断开房车外接电源，雾犬的低吼从停车区另一头逼近。"
    state_obligation:
      - "明确净雾滤芯消耗限制。"
      - "第一服务区进入不可久留状态。"
  - chapter: 9
    title: "抢车夜"
    function: "抢车小团体夜袭，测试车内第一版规则。"
    opening_hook: "夜色和迷雾里，抢车者砸开服务区消防柜，用撬棍、灭火器和假求救声同时冲击房车两侧。"
    main_payoff: "陆沉舟用破拆反制、车门分区和倒车路线保住房车，林知夏守住隔离区，车内第一次按规则协同。"
    next_hook: "系统判定车内契约初步成立，允许净雾滤芯进入稳定模式，但要求在天亮前驶离雾墙回压区。"
    state_obligation:
      - "车内第一版协同规则通过实战测试。"
      - "陆沉舟与林知夏形成第一次战术互信。"
  - chapter: 10
    title: "青河求救广播"
    function: "第一站收束，导向青河服务区和医疗位线索。"
    opening_hook: "天亮前，房车冲出服务区外环，旧广播频道忽然响起断续求救：青河服务区有医生、伤员和还能启动的医疗电源。"
    main_payoff: "房车稳定穿过第一段低浓度迷雾，陆沉舟确认净雾滤芯和车内规则可持续，林知夏决定正式留车。"
    next_hook: "广播最后混入犬吠和陌生终端音：检测到可解锁模块“简易医疗位”，但青河服务区污染等级正在上升。"
    state_obligation:
      - "第一站闭环完成。"
      - "下一单元目标锁定青河服务区与简易医疗位。"
approval_questions:
  - "是否认可 unit_0001 的核心闭环是净雾滤芯、第一条上车规则、林知夏入队和青河钩子？"
  - "是否认可 1-10 章每章都有明确开场压力、主爽点和下一章拉力？"
  - "是否认可第一站只把怪物推进到雾犬，不提前进入藤化伤员主线？"
  - "是否认可陆沉舟的边界通过拒绝、交易切割和抢车夜实战来证明？"
  - "是否认可通过后再进入 chapter 1 brief，而不是直接写正文？"
