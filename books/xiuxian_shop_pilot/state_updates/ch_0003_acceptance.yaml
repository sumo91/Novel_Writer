state_changes:
- 陈安将黄芽草叶尖以旧书样品名义小额变现三千元，并补交一个月部分房租二千五。
- 碎灵粉末被现实便携检测初步判断为非普通材料，但陈安决定暂不公开出售。
- 刘素芬怀疑陈安藏有爷爷遗产，现实逼卖压力继续存在。
- 许青确认巡卫扣下夜明筒，但没有查到小卖部门。
- 回春丹铺盯上细盐和夜明筒，要求见夜里开门的陈掌柜。
- 陈安拒绝当天见客，要求回春丹铺明晚带价来谈，并明确小卖部不是丹铺后仓。
