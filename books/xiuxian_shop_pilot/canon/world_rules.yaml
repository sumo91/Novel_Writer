setting: "现实世界的老城区小卖部与修仙界低阶坊市相连。第一阶段只展示坊市边缘、散修、巡卫和丹铺，不展开大宗门战争。"
power_system: "修仙界以炼气低阶修士为主，灵石是基础货币，符箓、丹药、低阶法器是常见交易品。现实人没有灵力，但可以使用部分不需认主的低阶物件。"
economy: "现实小商品在修仙界因稳定、便宜、稀奇而有价值；修仙界低阶材料在现实可能表现为异常矿物、药材或收藏品，但不能轻易大规模变现。"
organizations:
  - id: fangshi_patrol
    name: "青石坊巡卫"
    role: "维持坊市秩序，第一阶段负责盯上来历不明的现代货物。"
  - id: small_dan_shop
    name: "回春丹铺"
    role: "靠低阶丹药赚钱，对陈安带来的盐和急救用品产生敌意。"
technology_level: "现实为现代普通生活水平；修仙界低阶区域生活粗糙，照明、储物、防潮、调味、急救等实用品短缺。"
social_rules:
  - "坊市交易讲究来历，陌生货物若被认作无灵力法器，会引来巡卫盘查。"
  - "散修重利但怕麻烦，愿意为实用货付灵石，却不会轻易保护陈安。"
  - "现实亲戚和债主看不到修仙界，只会用现实账务逼迫陈安。"
hard_limits:
  - "小卖部仓库后门每天午夜开启一个时辰。"
  - "第一次阶段只能带小件货物穿门，不能带大件设备。"
  - "陈安没有灵力，不能突然学会强力法术。"
  - "修仙界物品进入现实后必须低调处理，不能立刻暴富到失真。"
