    function: "完成第一笔两界交易，明确后门时间规则和现代货物风险。"
    opening_hook: "陈安试探细盐、打火机和夜明筒价值。"
    main_payoff: "换到碎灵和黄芽草。"
    next_hook: "夜明筒被巡卫注意。"
    state_obligation:
      - "记录后门每天午夜一个时辰。"
      - "记录碎灵和黄芽草。"
  - chapter: 3
