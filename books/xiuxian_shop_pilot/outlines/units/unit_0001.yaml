    opening_hook: "陈安继承破店，被亲戚逼卖和催租压住。"
    main_payoff: "后门开启，青石坊散修许青登场询问细盐和火折。"
    next_hook: "门外修仙界客户愿意用碎灵交易。"
    state_obligation:
