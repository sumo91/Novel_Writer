logline: "继承破旧小卖部的陈安，发现仓库后门每天午夜通往修仙界坊市，他从一包盐、一只打火机开始做两界生意，在现实债务和修仙界规矩夹缝中，把爷爷留下的小店盘成自己的立身之本。"
full_book_arc: "第一阶段盘活小店并确认两界通道；第二阶段建立稳定货源和修仙界客户；第三阶段发现爷爷当年并非偶然守店，而是在替两界某个旧约收尾；终局陈安以店主身份制定自己的交易规矩。"
volume_plan:
  - id: pilot_001
    title: "午夜后门"
    chapters: "1-5"
    goal: "验证小卖部后门、第一笔交易、现实危机缓解和修仙界第一波风险。"
    payoff: "陈安确认小卖部不是负资产，而是两界通道；但现代货物引来坊市巡卫和丹铺注意。"
major_turning_points:
  - "第1章：仓库后门通向修仙界坊市。"
  - "第2章：陈安用现代精盐和小商品换到第一块灵石。"
  - "第3章：灵石在现实暂时解决租金压力，但异界丹铺开始盯上他的货。"
  - "第5章：陈安决定主动进货，而不是被动等门开。"
ending_direction: "陈安守住小卖部，并把它从爷爷留下的旧铺子变成两界交易的安全入口。"
