events:
- id: t001
  when: 三年前
  summary: 林照父亲因一场供应链融资欺诈破产，留下巨额债务。
- id: t002
  when: 一年前
  summary: 林照与周衍共同创办星阈科技，林照负责核心产品。
- id: t003
  when: 一个月前
  summary: 曜石资本提出 B 轮融资意向，但要求发布会数据必须足够亮眼。
- id: t004
  when: 第一章前夜
  summary: 林照发现演示数据被篡改，却被周衍反咬为项目负责人失职。
- id: t005
  when: 第 1 章
  summary: 林照被逼签署责任说明时首次触发逆光系统，随后取得秦暮雨提供的十分钟只读后台权限，并发现东澜医药验收未完成。
- id: t006
  when: 第 2 章
  summary: 林照在十分钟只读权限内确认客户未验收、演示账号登录设备异常和缓存清理请求，并将证据提交到发布会提问审核通道。
- id: t007
  when: 第 3 章
  summary: 林照将三项后台矛盾包装成风控问题投上发布会大屏，迫使周衍暂停发布会；秦暮雨公开要求保全日志，何盛随后要求会后见林照。
- id: t008
  when: 第 4 章
  summary: 何盛用顾问身份和补偿谈判试图压回发布会风波；林照识破追溯确认条款并拒绝联合口径，秦暮雨随后展示父亲旧案合同摘要中的相同结构。
- id: t009
  when: 第 5 章
  summary: 发布会恢复后，林照拆穿东澜补充说明的时间矛盾，让东澜代表承认发布会前未签正式验收；秦暮雨随后收到疑似东澜真实项目负责人关于被迫改口的私信。
- id: t010
  when: 第 6 章
  summary: 林照拆穿临时账号背锅逻辑，发现 ops_temp_07 与 legal_temp_02 都经过 event_control_review 二次审批；周衍转向指控林照违规接触后台。
- id: t011
  when: 第 7 章
  summary: 周衍以权限违规反咬林照，林照用只读权限、录音授权和操作日志保住证据合法性；秦暮雨建议调查三年前旧案的权限签收记录。
- id: t012
  when: 第 8 章
  summary: 秦暮雨解释旧案摘要来源，林照核验父亲旧案权限签收、追溯确认函和责任说明，发现只读接触被改写成操作责任；旧案经办人宋启明与曜石早期风控名单出现交集，指向项目库
    QY-17 风控备忘录。
- id: t013
  when: 第 9 章
  summary: 林照和秦暮雨验证疑似 QY-17 风控备忘录，确认责任承接模板 R-03 将父亲旧案与星阈当前追溯确认、event_control_review
    结构连接起来；何盛只作为较晚复核人出现，模板源头指向更早的 CP-L-02 项目库，周衍随即推动董事会临时听证。
- id: t014
  when: 第 10 章
  summary: 林照在董事会临时听证中提交发布会事故、权限合法性和责任模板风险三组证据，保住证据链、核心产品署名权和独立审计入口；何盛承认 R-03 早于自己进入曜石，模板源头指向
    CP-L-02，听证后林照收到宋启明与 CP-L-02 archive gate 的匿名消息。
