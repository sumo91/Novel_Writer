logline: "一个被赶出发布会的产品经理，靠只能验证商业谎言的系统，在资本局中局里夺回署名、事业和父亲名誉。"
full_book_arc: "从被迫背锅到掌控证据链，从夺回项目到揭穿融资联盟，林照逐步建立自己的商业信誉体系。"
volume_plan:
- id: volume_001
  title: "发布会逆转"
  goal: "林照证明星阈科技数据造假不是自己造成，并拿到追查曜石资本的第一条线索。"
major_turning_points:
- "第 1 章：林照在发布会后台觉醒逆光系统。"
- "第 3 章：公开演示反转，周衍第一次失控。"
- "第 10 章：林照发现父亲旧案与曜石资本有关。"
ending_direction: "林照以公开审计和真实产品网络击穿虚假估值联盟。"
