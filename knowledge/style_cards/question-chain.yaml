id: style_question_chain
scope: style
applies_to:
  - context
  - draft
  - review
  - drift
use_when: A scene depends on mystery, unknown rules, hidden identity, or tactical uncertainty.
principle: Keep reader pull active by turning each answer into a sharper next question.
checks:
  - Name the immediate question driving the scene.
  - Ensure at least one answer creates a new risk, restriction, or contradiction.
  - Avoid resolving a mystery into comfort without planting the next concrete problem.
failure_modes:
  - One static mystery repeated without movement
  - Vague unease without a question
  - Answer that stops momentum
severity: soft
